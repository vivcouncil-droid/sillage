<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILLAGE — AI Perfume Expert</title>
<meta name="description" content="Your scent, decoded. AI-crafted fragrance profile tailored to your emotions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A96E;--gold2:#E8D5B0;--gold3:#F5ECD8;
  --charcoal:#2C2C2C;--dark:#16100A;--white:#FEFAF6;
  --muted:#9B8E82;--border:#E2CEB4;
  --card:rgba(254,250,246,0.85);--glass:rgba(255,251,247,0.6);
  --bg1:#F5E6DA;--bg2:#EDD9C4;--bg3:#E4CBB0;
}
html,body{min-height:100%;font-family:'Inter',sans-serif;color:var(--charcoal)}
body{background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);background-attachment:fixed;transition:--bg1 1.5s,--bg2 1.5s,--bg3 1.5s}
body.marine{--bg1:#e2ecf2;--bg2:#cfe0eb;--bg3:#bdd4e3}
body.floral{--bg1:#f5e4ec;--bg2:#ecd0db;--bg3:#e2bfcc}
body.woody{--bg1:#ede0d0;--bg2:#deccb5;--bg3:#cfba9c}
body.warm{--bg1:#f5e0c4;--bg2:#eccba0;--bg3:#e2b87e}
.serif{font-family:'Playfair Display',Georgia,serif}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:60px}

/* ═══ LANDING ═══ */
.landing{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:0}
.land-bg{position:absolute;inset:0;background:url('./landing-bg.jpg') center top/cover no-repeat;z-index:0}
.land-fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 45%,rgba(237,213,192,0.92) 72%,rgba(232,206,180,1) 100%);z-index:1}
.land-content{position:relative;z-index:2;margin-top:auto;padding:0 32px 56px;text-align:center}
.land-headline{font-family:'Playfair Display',serif;font-size:36px;font-weight:400;line-height:1.2;color:var(--charcoal);margin-bottom:14px}
.land-headline em{font-style:italic;color:#7A5840}
.land-rule{width:28px;height:1px;background:var(--gold);margin:0 auto 16px;opacity:.8}
.land-sub{font-size:14px;color:#6B5E54;line-height:1.7;margin-bottom:40px;max-width:260px;margin-left:auto;margin-right:auto}
.btn-cta{display:inline-flex;align-items:center;gap:12px;background:rgba(22,16,10,0.88);color:var(--white);border:none;padding:19px 48px;font-family:'Playfair Display',serif;font-size:15px;letter-spacing:2.5px;cursor:pointer;border-radius:60px;position:relative;overflow:hidden;transition:all .4s;backdrop-filter:blur(16px);box-shadow:0 0 0 1px rgba(201,169,110,.35),0 8px 40px rgba(16,10,4,.3);-webkit-tap-highlight-color:transparent}
.btn-cta::after{content:'';position:absolute;top:-50%;left:-70%;width:35%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transform:skewX(-20deg);animation:shine 3.5s infinite}
@keyframes shine{0%{left:-70%}100%{left:130%}}
.btn-cta:hover{transform:translateY(-3px);box-shadow:0 0 0 1px rgba(201,169,110,.6),0 16px 48px rgba(16,10,4,.4),0 0 80px rgba(201,169,110,.12)}
.btn-cta-spark{animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.land-lang{font-size:10px;color:rgba(80,65,55,.5);margin-top:22px;letter-spacing:4px}

/* ═══ HEADER ═══ */
.hdr{padding:18px 24px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(245,230,218,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:30}
.hdr-logo{font-family:'Playfair Display',serif;font-size:16px;letter-spacing:5px;color:var(--charcoal)}
.hdr-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;padding:4px;font-family:'Inter',sans-serif;letter-spacing:.5px;-webkit-tap-highlight-color:transparent}
.hdr-back:hover{color:var(--charcoal)}

/* ═══ PROGRESS ═══ */
.prog{padding:14px 24px 0}
.prog-lbl{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:9px}
.prog-track{height:1px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#E8C87A);transition:width .6s ease}
.prog-dots{display:flex;gap:7px;margin-top:9px}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--border);transition:all .3s}
.pdot.on{background:var(--gold);transform:scale(1.4)}
.pdot.done{background:var(--gold2)}

/* ═══ QUIZ ═══ */
.qbody{padding:28px 24px 0}
.qlbl{font-size:10px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:18px}
.qq{font-family:'Playfair Display',serif;font-size:23px;font-weight:400;line-height:1.35;margin-bottom:7px}
.qsub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:28px}
.ocard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px 14px;cursor:pointer;transition:all .22s;text-align:left;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(8px);-webkit-tap-highlight-color:transparent}
.ocard:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,169,110,.1)}
.ocard.sel{border-color:var(--gold);background:rgba(201,169,110,.1);box-shadow:0 0 0 1px var(--gold)}
.ocard-ico{font-size:22px}
.ocard-lbl{font-family:'Playfair Display',serif;font-size:15px;color:var(--charcoal)}
.ocard-desc{font-size:11px;color:var(--muted);line-height:1.4}
.btn-next{width:100%;background:var(--charcoal);color:var(--white);border:none;padding:17px;font-family:'Playfair Display',serif;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all .3s;-webkit-tap-highlight-color:transparent}
.btn-next:hover:not(:disabled){background:var(--dark)}
.btn-next:disabled{opacity:.28;cursor:not-allowed}

/* ═══ VIBE ═══ */
.vbody{padding:28px 24px}
.slbl{font-size:10px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px}
.stitle{font-family:'Playfair Display',serif;font-size:23px;font-weight:400;line-height:1.35;margin-bottom:8px}
.sdesc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.65}
.vtxt{width:100%;min-height:140px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px;font-family:'Inter',sans-serif;font-size:14px;color:var(--charcoal);resize:none;line-height:1.75;outline:none;transition:border .2s;-webkit-appearance:none}
.vtxt:focus{border-color:var(--gold)}
.vtxt::placeholder{color:var(--muted);font-style:italic}
.vctr{text-align:right;font-size:11px;color:var(--muted);margin-top:6px;margin-bottom:20px}
.hlbl{font-size:10px;color:var(--muted);margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
.hints{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.hchip{background:rgba(201,169,110,.1);border:1px solid var(--gold2);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--charcoal);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.hchip:hover{background:rgba(201,169,110,.25)}

/* ═══ NOTES ═══ */
.nbody{padding:28px 24px}
.ngrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.nchip{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 8px;cursor:pointer;transition:all .2s;text-align:center;backdrop-filter:blur(8px);-webkit-tap-highlight-color:transparent}
.nchip:hover{border-color:var(--gold);transform:translateY(-1px)}
.nchip.sel{border-color:var(--gold);background:rgba(201,169,110,.12)}
.nchip.hide{display:none}
.nchip-ico{font-size:20px;margin-bottom:6px}
.nchip-lbl{font-size:11px;color:var(--charcoal)}
.btn-more{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:12px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:8px;margin-bottom:16px;transition:all .2s;font-family:'Inter',sans-serif}
.btn-more:hover{border-color:var(--gold);color:var(--charcoal)}
.btn-skip{width:100%;margin-top:10px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:13px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:8px;font-family:'Inter',sans-serif;transition:all .2s}
.btn-skip:hover{border-color:var(--gold);color:var(--charcoal)}

/* ═══ COLLECTION ═══ */
.cbody{padding:28px 24px}
.cinwrap{display:flex;gap:10px;margin-bottom:16px}
.cin{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:var(--charcoal);outline:none;transition:border .2s;-webkit-appearance:none}
.cin:focus{border-color:var(--gold)}
.cadd{background:var(--charcoal);color:var(--white);border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-size:20px;-webkit-tap-highlight-color:transparent}
.clist{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;min-height:48px}
.citem{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.crem{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px;-webkit-tap-highlight-color:transparent}
.crem:hover{color:#c0392b}
.cempty{font-size:13px;color:var(--muted);font-style:italic;padding:10px 0}

/* ═══ LOADING ═══ */
.lscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
.llogo{font-family:'Playfair Display',serif;font-size:26px;letter-spacing:8px;color:var(--charcoal);margin-bottom:6px}
.lsub{font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:60px}
.lanim{position:relative;width:72px;height:72px;margin-bottom:40px}
.ring{position:absolute;inset:0;border-radius:50%;border:1px solid transparent;animation:spin 2s linear infinite}
.r1{border-top-color:var(--gold)}
.r2{border-right-color:var(--gold2);animation-duration:3s;inset:8px}
.r3{border-bottom-color:rgba(201,169,110,.3);animation-duration:4.5s;inset:16px}
.rdot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--charcoal);opacity:.7;min-height:26px}

/* ═══ RESULTS ═══ */
.rpage{padding-bottom:80px}

/* profile hero */
.rhero{padding:44px 28px 36px;text-align:center;position:relative;overflow:hidden}
.rhero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,.1) 0%,transparent 70%);pointer-events:none}
.rlogo{font-family:'Playfair Display',serif;font-size:12px;letter-spacing:6px;color:var(--muted);margin-bottom:22px;text-transform:uppercase}
.rbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.3);border-radius:20px;padding:6px 18px;margin-bottom:20px}
.rbdot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:glow 2s ease infinite}
.rbtxt{font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.glass-card{background:var(--glass);border:1px solid rgba(201,169,110,.2);border-radius:22px;padding:26px 24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 4px 40px rgba(201,169,110,.07),inset 0 1px 0 rgba(255,255,255,.7)}
.profile-txt{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;line-height:1.85;color:var(--charcoal);margin-bottom:20px}
.pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.pill{background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.35);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--charcoal);letter-spacing:1px;animation:pilin .5s ease forwards;opacity:0;transform:translateY(6px)}
@keyframes pilin{to{opacity:1;transform:translateY(0)}}

/* section */
.rsec{padding:28px 24px 0}
.rsec-lbl{font-size:10px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
.rsec-ttl{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;color:var(--charcoal);margin-bottom:20px}

/* match cards */
.mcard{background:var(--card);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:16px;backdrop-filter:blur(8px);transition:transform .3s,box-shadow .3s}
.mcard:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(44,28,12,.1)}
.mcard.hero{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 8px 48px rgba(201,169,110,.15)}
.mcard-top{padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.mcard-top.dark{background:var(--charcoal)}
.mbadge{font-size:10px;letter-spacing:2px;text-transform:uppercase}
.mbadge.lt{color:var(--gold2)}
.mbadge.mt{color:var(--muted)}
.mprice{font-size:12px;color:var(--gold);letter-spacing:2px}
.mcard-body{padding:22px 22px 24px}
.mbrand{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.mname{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:var(--charcoal);margin-bottom:5px;line-height:1.15}
.mfam{font-size:12px;color:var(--gold);margin-bottom:18px;letter-spacing:.5px}
.mwhy{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);font-style:italic}
.mnotes{display:flex;gap:7px;flex-wrap:wrap}
.ntag{background:rgba(201,169,110,.1);border:1px solid var(--gold2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--charcoal)}

/* layering */
.lcard{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:24px 22px;margin-bottom:14px;backdrop-filter:blur(8px)}
.ltlbl{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:18px}
.lbottles{display:flex;align-items:center;gap:8px;margin-bottom:22px}
.lbottle{flex:1;background:linear-gradient(135deg,rgba(201,169,110,.07),rgba(232,213,176,.14));border:1px solid var(--gold2);border-radius:14px;padding:16px 10px;text-align:center;font-size:12px;color:var(--charcoal);line-height:1.5}
.lbico{font-size:24px;display:block;margin-bottom:8px}
.lblend{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;padding:0 4px}
.lplus{font-size:18px;color:var(--gold);line-height:1}
.lglow{width:1px;height:20px;background:linear-gradient(to bottom,var(--gold),transparent);opacity:.5}
.lrlbl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.lrtxt{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--charcoal);line-height:1.8;margin-bottom:12px}
.linstr{font-size:12px;color:var(--muted);line-height:1.7;padding:10px 14px;background:rgba(201,169,110,.05);border-radius:8px;border-left:2px solid var(--gold2)}

/* guidance */
.gcard{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:24px 22px;margin-bottom:14px}
.gdir{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.gico{width:38px;height:38px;border-radius:50%;background:rgba(201,169,110,.1);border:1px solid var(--gold2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.gfam{font-family:'Playfair Display',serif;font-size:20px;color:var(--charcoal)}
.gadv{font-size:13px;color:var(--muted);line-height:1.75;font-style:italic}

/* recipe */
.recipe{background:var(--charcoal);border-radius:22px;padding:30px 26px;margin:28px 24px 0;position:relative;overflow:hidden}
.recipe::before{content:'';position:absolute;top:-70px;right:-70px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,.1) 0%,transparent 70%);pointer-events:none}
.recipe::after{content:'';position:absolute;bottom:-40px;left:-40px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,.07) 0%,transparent 70%);pointer-events:none}
.recipe-ttl{font-family:'Playfair Display',serif;font-size:13px;font-weight:400;color:var(--gold2);margin-bottom:24px;text-align:center;letter-spacing:5px;text-transform:uppercase}
.rrow{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.07)}
.rrow:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.rico{width:36px;height:36px;border-radius:50%;background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.25);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rlbl{font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.rval{font-family:'Playfair Display',serif;font-size:15px;color:rgba(255,255,255,.88);line-height:1.55;font-style:italic}
.recipe-acts{display:flex;gap:10px;margin-top:24px}
.ract{flex:1;padding:14px;border-radius:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .25s;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
.ract-save{background:rgba(201,169,110,.18);border:1px solid rgba(201,169,110,.4);color:var(--gold2)}
.ract-save:hover{background:rgba(201,169,110,.3)}
.ract-ref{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5)}
.ract-ref:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.8)}

/* bottom ctas */
.bctas{padding:24px 24px 0;display:flex;flex-direction:column;gap:10px}
.btn-explore{background:var(--charcoal);color:var(--white);border:none;padding:17px;font-family:'Playfair Display',serif;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all .3s;-webkit-tap-highlight-color:transparent}
.btn-explore:hover{background:var(--dark)}
.btn-restart{background:transparent;border:1px solid var(--border);color:var(--muted);padding:13px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:4px;transition:all .3s;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-restart:hover{border-color:var(--gold);color:var(--charcoal)}
.divln{height:1px;background:var(--border);margin:28px 24px 0}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const NOTES=[
  {id:'oud',l:'Oud',i:'🪵'},{id:'amber',l:'Amber',i:'🟡'},
  {id:'bergamot',l:'Bergamot',i:'🍋'},{id:'jasmine',l:'Jasmin',i:'🌸'},
  {id:'vanilla',l:'Vanilija',i:'🤍'},{id:'patchouli',l:'Pačuli',i:'🌿'},
  {id:'rose',l:'Ruža',i:'🌹'},{id:'vetiver',l:'Vetiver',i:'🌾'},
  {id:'sandalwood',l:'Sandalovina',i:'🪨'},{id:'cedar',l:'Cedar',i:'🌲'},
  {id:'musk',l:'Mošus',i:'🫧'},{id:'tobacco',l:'Duhan',i:'🍂'},
  {id:'iris',l:'Iris',i:'💜'},{id:'pepper',l:'Papar',i:'🖤'},
  {id:'neroli',l:'Neroli',i:'🌼'},{id:'leather',l:'Koža',i:'🤎'},
  {id:'incense',l:'Tamjan',i:'🕯️'},{id:'coconut',l:'Kokos',i:'🥥'}
];
const QUIZ=[
  {id:'family',q:'Koji mirisi ti se najviše odgovaraju?',sub:'Odaberi jedan smjer',t:'s',opts:[
    {v:'sweet',l:'Slatko',i:'🍯',d:'Vanilija, karamel, mošus'},
    {v:'fresh',l:'Svježe',i:'🌿',d:'Citrus, aqua, zeleno'},
    {v:'woody',l:'Drvenasto',i:'🪵',d:'Sandalovina, cedar, pačuli'},
    {v:'spicy',l:'Začinjeno',i:'🌶️',d:'Oud, crni papar, kardamom'}
  ]},
  {id:'season',q:'Koje godišnje doba opisuje tvoj idealni miris?',sub:'Svako doba nosi svoju energiju',t:'s',opts:[
    {v:'spring',l:'Proljeće',i:'🌸',d:'Cvjetno, svježe, nježno'},
    {v:'summer',l:'Ljeto',i:'☀️',d:'Morsko, lagano, citrus'},
    {v:'autumn',l:'Jesen',i:'🍂',d:'Toplo, začinjeno, amber'},
    {v:'winter',l:'Zima',i:'❄️',d:'Duboko, kožno, dimno'}
  ]},
  {id:'occasion',q:'Kada ga nosiš?',sub:'Možeš odabrati više',t:'m',opts:[
    {v:'daily',l:'Svakodnevno',i:'☕',d:'Casual, lagan, svjež'},
    {v:'evening',l:'Večernji',i:'🌙',d:'Taman, bogat, intrigantan'},
    {v:'work',l:'Posao',i:'💼',d:'Profesionalan, nenametljiv'},
    {v:'special',l:'Posebne prilike',i:'✨',d:'Upečatljiv, nezaboravan'}
  ]},
  {id:'intensity',q:'Koji intenzitet preferiraš?',sub:'Koliko daleko ide tvoj sillage?',t:'s',opts:[
    {v:'light',l:'Nježan',i:'🪷',d:'Blizak, intiman'},
    {v:'medium',l:'Umjeren',i:'🌺',d:'Prisutan, ugodan'},
    {v:'strong',l:'Jak',i:'💥',d:'Upečatljiv, dalekosežan'},
    {v:'varies',l:'Ovisi',i:'🎭',d:'Prilagodljiv, kontekstualan'}
  ]}
];
const HINTS=["Kiša na toplom asfaltu","Stara biblioteka i koža","Jutarnja kava i drvo","Ljetna noć na moru","Cvijeće nakon grmljavine"];

let S={sc:'landing',qi:0,ans:{},vibe:'',notes:[],notesX:false,coll:[],cin:'',res:null,lmsg:'',_iv:null};
const ss=p=>{Object.assign(S,p);render()};

function applyBg(kw){
  const k=(kw||[]).join(' ').toLowerCase();
  document.body.className='';
  if(/marine|ocean|sea|aqua|citrus|fresh|bergamot/.test(k))document.body.classList.add('marine');
  else if(/floral|rose|jasmine|flower|lily|neroli|iris/.test(k))document.body.classList.add('floral');
  else if(/woody|wood|oud|cedar|sandalwood|patchouli|vetiver|tobacco|leather|incense/.test(k))document.body.classList.add('woody');
  else if(/vanilla|sweet|warm|amber|caramel|honey|spice/.test(k))document.body.classList.add('warm');
}

function render(){
  const app=document.getElementById('app');if(!app)return;
  app.innerHTML='';
  const fn={landing,quiz,vibe,notes,collection,loading,results}[S.sc];
  if(fn)app.appendChild(fn());
}

/* LANDING */
function landing(){
  const d=document.createElement('div');d.className='landing';
  d.innerHTML=`
    <div class="land-bg"></div>
    <div class="land-fade"></div>
    <div class="land-content">
      <h1 class="land-headline serif">Your scent,<br><em>decoded.</em></h1>
      <div class="land-rule"></div>
      <p class="land-sub">AI-crafted fragrance profile tailored to your emotions, memories and desires.</p>
      <button class="btn-cta" id="s0">Saznaj svoj recept <span class="btn-cta-spark">✦</span></button>
      <div class="land-lang">HR | EN</div>
    </div>
  `;
  d.querySelector('#s0').onclick=()=>ss({sc:'quiz',qi:0,ans:{}});
  return d;
}

/* QUIZ */
function quiz(){
  const step=QUIZ[S.qi],ans=S.ans[step.id],isMul=step.t==='m';
  const ok=isMul?(ans&&ans.length>0):!!ans;
  const d=document.createElement('div');
  d.innerHTML=`
    <div class="hdr"><button class="hdr-back" id="bk">← Natrag</button><div class="hdr-logo serif">SILLAGE</div></div>
    <div class="prog">
      <div class="prog-lbl">Korak ${S.qi+1} od ${QUIZ.length}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${((S.qi+1)/QUIZ.length)*100}%"></div></div>
      <div class="prog-dots">${QUIZ.map((_,i)=>`<div class="pdot${i<S.qi?' done':i===S.qi?' on':''}"></div>`).join('')}</div>
    </div>
    <div class="qbody">
      <div class="qlbl">Korak ${S.qi+1}</div>
      <div class="qq serif">${step.q}</div>
      <div class="qsub">${step.sub}</div>
      <div class="ogrid">${step.opts.map(o=>{const s=isMul?(ans&&ans.includes(o.v)):(ans===o.v);return`<div class="ocard${s?' sel':''}" data-v="${o.v}"><div class="ocard-ico">${o.i}</div><div class="ocard-lbl serif">${o.l}</div><div class="ocard-desc">${o.d}</div></div>`}).join('')}</div>
      <button class="btn-next" id="nx" ${ok?'':'disabled'}>Dalje →</button>
    </div>
  `;
  d.querySelectorAll('.ocard').forEach(c=>{c.onclick=()=>{const v=c.dataset.v;if(isMul){const cur=S.ans[step.id]||[];ss({ans:{...S.ans,[step.id]:cur.includes(v)?cur.filter(x=>x!==v):[...cur,v]}})}else ss({ans:{...S.ans,[step.id]:v}})}});
  d.querySelector('#bk').onclick=()=>S.qi>0?ss({qi:S.qi-1}):ss({sc:'landing'});
  d.querySelector('#nx').onclick=()=>S.qi<QUIZ.length-1?ss({qi:S.qi+1}):ss({sc:'vibe'});
  return d;
}

/* VIBE */
function vibe(){
  const d=document.createElement('div');
  d.innerHTML=`
    <div class="hdr"><button class="hdr-back" id="bk">← Natrag</button><div class="hdr-logo serif">SILLAGE</div></div>
    <div class="vbody">
      <div class="slbl">The Vibe Box</div>
      <div class="stitle serif">Opiši svoj vibe</div>
      <div class="sdesc">Napiši što želiš da tvoj idealni miris opisuje, osjeća se, podsjeća na...</div>
      <textarea class="vtxt" id="vt" maxlength="300" placeholder='"Tražim nešto što miriše na staru knjižnicu i kišu, ali da ima malo citrusa."'>${S.vibe}</textarea>
      <div class="vctr" id="vc">${S.vibe.length}/300</div>
      <div class="hlbl">Inspiracija</div>
      <div class="hints">${HINTS.map(h=>`<div class="hchip" data-h="${h}">${h}</div>`).join('')}</div>
      <button class="btn-next" id="nx">Dalje →</button>
    </div>
  `;
  const ta=d.querySelector('#vt'),vc=d.querySelector('#vc');
  ta.oninput=()=>{S.vibe=ta.value;vc.textContent=`${ta.value.length}/300`};
  d.querySelectorAll('.hchip').forEach(c=>{c.onclick=()=>{ta.value=c.dataset.h;S.vibe=c.dataset.h;vc.textContent=`${c.dataset.h.length}/300`}});
  d.querySelector('#bk').onclick=()=>ss({sc:'quiz',qi:QUIZ.length-1});
  d.querySelector('#nx').onclick=()=>ss({sc:'notes'});
  return d;
}

/* NOTES */
function notes(){
  const sel=S.notes,sx=S.notesX;
  const d=document.createElement('div');
  d.innerHTML=`
    <div class="hdr"><button class="hdr-back" id="bk">← Natrag</button><div class="hdr-logo serif">SILLAGE</div></div>
    <div class="nbody">
      <div class="slbl">Note Picker</div>
      <div class="stitle serif">Odaberi note koje te privlače</div>
      <div class="sdesc">Možeš odabrati više — ili preskočiti.</div>
      <div class="ngrid">${NOTES.map((n,i)=>`<div class="nchip${sel.includes(n.id)?' sel':''}${(!sx&&i>=12)?' hide':''}" data-id="${n.id}"><div class="nchip-ico">${n.i}</div><div class="nchip-lbl">${n.l}</div></div>`).join('')}</div>
      ${!sx?`<button class="btn-more" id="sm">+ Prikaži sve note (${NOTES.length-12} više)</button>`:''}
      <button class="btn-next" id="nx">Dalje →</button>
      <button class="btn-skip" id="sk">Preskoči</button>
    </div>
  `;
  d.querySelectorAll('.nchip').forEach(c=>{c.onclick=()=>{const id=c.dataset.id;ss({notes:sel.includes(id)?sel.filter(n=>n!==id):[...sel,id]})}});
  d.querySelector('#bk').onclick=()=>ss({sc:'vibe'});
  d.querySelector('#nx').onclick=()=>ss({sc:'collection'});
  d.querySelector('#sk').onclick=()=>ss({sc:'collection'});
  const sm=d.querySelector('#sm');if(sm)sm.onclick=()=>ss({notesX:true});
  return d;
}

/* COLLECTION */
function collection(){
  const d=document.createElement('div');
  d.innerHTML=`
    <div class="hdr"><button class="hdr-back" id="bk">← Natrag</button><div class="hdr-logo serif">SILLAGE</div></div>
    <div class="cbody">
      <div class="slbl">Digitalna Polica</div>
      <div class="stitle serif">Što već imaš?</div>
      <div class="sdesc">Dodaj parfeme koje posjeduješ — AI će maksimizirati tvoju kolekciju kroz layering.</div>
      <div class="cinwrap">
        <input class="cin" id="ci" placeholder='npr. "Dior Sauvage EDT"' value="${S.cin||''}">
        <button class="cadd" id="ca">+</button>
      </div>
      <div class="clist">${S.coll.length===0?'<div class="cempty">Još nisi dodao/la ništa.</div>':S.coll.map((x,i)=>`<div class="citem"><span>🫙 ${x}</span><button class="crem" data-i="${i}">✕</button></div>`).join('')}</div>
      <button class="btn-next" id="an">Analiziraj moj profil ✦</button>
      <button class="btn-skip" id="sk">Preskoči i analiziraj</button>
    </div>
  `;
  const inp=d.querySelector('#ci');
  inp.oninput=()=>{S.cin=inp.value};
  inp.onkeydown=e=>{if(e.key==='Enter')add()};
  function add(){const v=(S.cin||'').trim();if(v)ss({coll:[...S.coll,v],cin:''})}
  d.querySelector('#ca').onclick=add;
  d.querySelectorAll('.crem').forEach(b=>{b.onclick=()=>ss({coll:S.coll.filter((_,i)=>i!==parseInt(b.dataset.i))})});
  d.querySelector('#bk').onclick=()=>ss({sc:'notes'});
  d.querySelector('#an').onclick=analyze;
  d.querySelector('#sk').onclick=analyze;
  return d;
}

/* LOADING */
function loading(){
  const d=document.createElement('div');d.className='lscreen';
  d.innerHTML=`<div class="llogo serif">SILLAGE</div><div class="lsub">Crafting your scent profile</div><div class="lanim"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="rdot"></div></div><div class="lmsg serif" id="lm">${S.lmsg||'Analiziram tvoj mirisni profil...'}</div>`;
  return d;
}

/* ANALYZE */
async function analyze(){
  const msgs=['Analiziram tvoj mirisni profil...','Pronalazim savršene kombinacije...','Gradim tvoj Scent Recipe...','Još trenutak...'];
  let mi=0;
  ss({sc:'loading',lmsg:msgs[0]});
  if(S._iv)clearInterval(S._iv);
  S._iv=setInterval(()=>{mi=(mi+1)%msgs.length;const el=document.getElementById('lm');if(el)el.textContent=msgs[mi]},2200);

  const sd={preferences:{scent_family:S.ans.family,season:S.ans.season,occasions:S.ans.occasion,intensity:S.ans.intensity,vibe_text:S.vibe||'not provided',selected_notes:S.notes},current_collection:S.coll};
  const h2=S.coll.length>=2;
  const sys=`You are SILLAGE — a world-class luxury perfume expert. Write with the poetic sensibility of a master perfumer. Return ONLY valid JSON, no markdown, no backticks, no extra text:
{"profile_summary":"2-3 poetic editorial sentences about their unique scent personality — write like Vogue, not Wikipedia","confidence_score":92,"scent_keywords":["evocative keyword 1","keyword 2","keyword 3","keyword 4"],"recommendations":{"top_match":{"brand":"","name":"","concentration":"","scent_family":"","price_range":"$/$$/$$$/$$$$","reasoning":"1-2 sentences written like a luxury perfumer — evocative, sensory, personal","key_notes":["n1","n2","n3","n4"]},"second_match":{"brand":"","name":"","concentration":"","scent_family":"","price_range":"","reasoning":"evocative 1-2 sentences","key_notes":["n1","n2","n3"]},"strategic_guidance":{"family":"","advice":"1-2 evocative sentences pointing to their next fragrance chapter"}},"layering_lab":{"internal_combination":${h2?`{"perfume_a":"${S.coll[0]}","perfume_b":"${S.coll[1]}","result_vibe":"Write like a perfumer: opens with X, settles into Y — no generic phrases","instructions":"Practical layering steps"}`:'null'},"upsell_layering":{"existing":"${S.coll[0]||'their preferred style'}","recommended_add":"Brand Name","effect":"Write like a perfumer: opens with X, settles into Y"}},"final_recipe":{"nosi":"","slozi":"","istrazi":""}}`;

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:sys,messages:[{role:'user',content:JSON.stringify(sd)}]})});
    const data=await r.json();
    const txt=data.content[0].text.replace(/```json|```/g,'').trim();
    clearInterval(S._iv);
    const p=JSON.parse(txt);
    applyBg(p.scent_keywords);
    ss({res:p,sc:'results'});
  }catch(e){
    clearInterval(S._iv);
    const fb={profile_summary:"You seek warmth without weight — a fragrance that settles into skin like a second self. Your instinct gravitates toward the intimate, the evocative, the kind of scent that lingers in a room long after you've left.",confidence_score:88,scent_keywords:["Toplo","Senzualno","Drvenasto","Intimno"],recommendations:{top_match:{brand:"Maison Margiela",name:"Jazz Club",concentration:"EDT",scent_family:"Oriental Woody",price_range:"$$$",reasoning:"Opens with a swirl of rum and tobacco — as if stepping into a candlelit bar. The vanilla drydown wraps everything in warmth that's present but never loud.",key_notes:["Duhan","Vanilija","Rum","Drvo"]},second_match:{brand:"Tom Ford",name:"Oud Wood",concentration:"EDP",scent_family:"Woody Oriental",price_range:"$$$$",reasoning:"Quietly commanding. Oud and sandalwood create a presence that doesn't announce itself — it's simply, unforgettably there.",key_notes:["Oud","Sandalovina","Vetiver"]},strategic_guidance:{family:"Oriental Woody",advice:"Follow the thread of warm resins and dark wood — the Chypre family awaits, with its sophisticated mossy depth and bergamot brightness."}},layering_lab:{internal_combination:h2?{perfume_a:S.coll[0],perfume_b:S.coll[1],result_vibe:"Opens with bright citrus clarity, then deepens into a warm amber drydown that carries beautifully past midnight.",instructions:"2 spreja prvog parfema kao baza — pričekaj minutu, zatim 1 sprej drugog na pulsnim točkama."}:null,upsell_layering:{existing:S.coll[0]||"Tvoj omiljeni miris",recommended_add:"By the Fireplace — Maison Margiela",effect:"Opens with smoky birch sweetness, then settles into a warm vanilla-amber accord that makes every room feel like a winter evening."}},final_recipe:{nosi:"Maison Margiela Jazz Club",slozi:"Jazz Club + "+(S.coll[0]||"Versace Eros"),istrazi:"Oriental Woody → Chypre obitelj"}};
    applyBg(fb.scent_keywords);
    ss({res:fb,sc:'results'});
  }
}

/* RESULTS */
function results(){
  const r=S.res;if(!r)return document.createElement('div');
  const d=document.createElement('div');d.className='rpage';
  const ic=r.layering_lab?.internal_combination;
  const up=r.layering_lab?.upsell_layering;

  d.innerHTML=`
    <div class="rhero">
      <div class="rlogo">SILLAGE</div>
      <div class="rbadge"><div class="rbdot"></div><div class="rbtxt">${r.confidence_score||89}% Match · AI Profil</div></div>
      <div class="glass-card">
        <p class="profile-txt serif">"${r.profile_summary}"</p>
        <div class="pills">${(r.scent_keywords||[]).map((k,i)=>`<span class="pill" style="animation-delay:${i*.12}s">${k}</span>`).join('')}</div>
      </div>
    </div>

    <div class="rsec">
      <div class="rsec-lbl">The Matches</div>
      <div class="rsec-ttl serif">Specifične preporuke</div>
      <div class="mcard hero">
        <div class="mcard-top dark"><span class="mbadge lt">✦ Best match for your profile</span><span class="mprice">${r.recommendations.top_match.price_range}</span></div>
        <div class="mcard-body">
          <div class="mbrand">${r.recommendations.top_match.brand}</div>
          <div class="mname serif">${r.recommendations.top_match.name}</div>
          <div class="mfam">${r.recommendations.top_match.scent_family} · ${r.recommendations.top_match.concentration}</div>
          <div class="mwhy">${r.recommendations.top_match.reasoning}</div>
          <div class="mnotes">${(r.recommendations.top_match.key_notes||[]).map(n=>`<span class="ntag">${n}</span>`).join('')}</div>
        </div>
      </div>
      <div class="mcard">
        <div class="mcard-top"><span class="mbadge mt">Alternativa</span><span class="mprice">${r.recommendations.second_match.price_range}</span></div>
        <div class="mcard-body">
          <div class="mbrand">${r.recommendations.second_match.brand}</div>
          <div class="mname serif">${r.recommendations.second_match.name}</div>
          <div class="mfam">${r.recommendations.second_match.scent_family} · ${r.recommendations.second_match.concentration}</div>
          <div class="mwhy">${r.recommendations.second_match.reasoning}</div>
          <div class="mnotes">${(r.recommendations.second_match.key_notes||[]).map(n=>`<span class="ntag">${n}</span>`).join('')}</div>
        </div>
      </div>
    </div>

    <div class="divln"></div>

    <div class="rsec">
      <div class="rsec-lbl">Layering Lab</div>
      <div class="rsec-ttl serif">Umjetnost slojevitosti</div>
      ${ic?`<div class="lcard">
        <div class="ltlbl">Internal · Iz tvoje kolekcije</div>
        <div class="lbottles">
          <div class="lbottle"><span class="lbico">🫙</span>${ic.perfume_a}</div>
          <div class="lblend"><div class="lglow"></div><div class="lplus">+</div><div class="lglow"></div></div>
          <div class="lbottle"><span class="lbico">🫙</span>${ic.perfume_b}</div>
        </div>
        <div class="lrlbl">Dobivaš</div>
        <div class="lrtxt">"${ic.result_vibe}"</div>
        <div class="linstr">${ic.instructions}</div>
      </div>`:''}
      ${up?`<div class="lcard">
        <div class="ltlbl">Upsell · Nadogradnja kolekcije</div>
        <div class="lbottles">
          <div class="lbottle"><span class="lbico">🫙</span>${up.existing}</div>
          <div class="lblend"><div class="lglow"></div><div class="lplus">+</div><div class="lglow"></div></div>
          <div class="lbottle"><span class="lbico">✨</span>${up.recommended_add}</div>
        </div>
        <div class="lrlbl">Efekt</div>
        <div class="lrtxt">"${up.effect}"</div>
      </div>`:''}
      ${r.recommendations.strategic_guidance?`<div class="gcard">
        <div class="ltlbl">Strategic Guidance · Tvoj sljedeći smjer</div>
        <div class="gdir">
          <div class="gico">🧭</div>
          <div class="gfam serif">${r.recommendations.strategic_guidance.family}</div>
        </div>
        <div class="gadv">${r.recommendations.strategic_guidance.advice}</div>
      </div>`:''}
    </div>

    <div class="recipe">
      <div class="recipe-ttl">✦ Tvoj Scent Recipe</div>
      <div class="rrow"><div class="rico">👃</div><div><div class="rlbl">NOSI</div><div class="rval">${r.final_recipe.nosi}</div></div></div>
      <div class="rrow"><div class="rico">🫙</div><div><div class="rlbl">SLOŽI</div><div class="rval">${r.final_recipe.slozi}</div></div></div>
      <div class="rrow"><div class="rico">🧭</div><div><div class="rlbl">ISTRAŽI</div><div class="rval">${r.final_recipe.istrazi}</div></div></div>
      <div class="recipe-acts">
        <button class="ract ract-save" id="sh">✦ Spremi profil</button>
        <button class="ract ract-ref" id="rf">Refine →</button>
      </div>
    </div>

    <div class="bctas">
      <button class="btn-explore" id="ex">Istraži drugi vibe →</button>
      <button class="btn-restart" id="rs">↺ Počni iznova</button>
    </div>
  `;

  d.querySelector('#rs').onclick=()=>{document.body.className='';ss({sc:'landing',qi:0,ans:{},vibe:'',notes:[],notesX:false,coll:[],cin:'',res:null})};
  d.querySelector('#rf').onclick=()=>ss({sc:'vibe'});
  d.querySelector('#ex').onclick=()=>ss({sc:'vibe'});
  d.querySelector('#sh').onclick=()=>{if(navigator.share)navigator.share({title:'Moj SILLAGE Scent Recipe',text:r.final_recipe.nosi,url:location.href});else{navigator.clipboard?.writeText(location.href);alert('Link kopiran!')}};
  return d;
}

render();
</script>
</body>
</html>
