<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SILLAGE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* BASE */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:#F4E3D1}
body{font-family:'Inter',sans-serif;color:#2B2928;font-size:15px}
.s{font-family:'Playfair Display',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;-webkit-appearance:none}
img{display:block;max-width:100%}

/* APP SHELL */
#app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* ══════════════════════════════
   PAGE: LANDING
══════════════════════════════ */
#pg-landing{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:url('./landing-bg.png') center top/cover no-repeat;
  position:relative;
}
/* Soft fade at bottom so text is readable */
#pg-landing::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:60%;
  background:linear-gradient(to top,rgba(244,227,209,1) 40%,rgba(244,227,209,0) 100%);
  z-index:1;pointer-events:none;
}
.land-header{position:relative;z-index:2}
.land-bottle{position:relative;z-index:2}
.land-body{position:relative;z-index:2}
.land-header{
  padding:44px 28px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}
.land-logo{
  font-family:'Playfair Display',serif;
  font-size:24px;
  letter-spacing:.2em;
  color:#2B2928;
  margin-bottom:5px;
}
.land-tagline{
  font-size:9px;
  letter-spacing:.5em;
  text-transform:uppercase;
  color:#C9A15E;
}
.land-bottle{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 40px 0;
}
.land-bottle img{
  width:100%;
  max-width:260px;
  height:auto;
  object-fit:contain;
  filter:drop-shadow(0 16px 40px rgba(160,100,60,.22));
  animation:float 5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.land-body{
  padding:0 28px 52px;
  text-align:center;
}
.land-headline{
  font-family:'Playfair Display',serif;
  font-size:38px;
  font-weight:400;
  line-height:1.1;
  margin-bottom:10px;
}
.land-headline em{
  font-style:italic;
  color:#B8746C;
  display:block;
}
.land-divider{
  width:20px;height:1px;
  background:#C9A15E;
  margin:16px auto;
}
.land-desc{
  font-size:14px;
  color:#6B5E54;
  line-height:1.7;
  margin-bottom:32px;
  max-width:260px;
  margin-left:auto;
  margin-right:auto;
}
.land-cta{
  width:100%;
  background:#2B2928;
  color:#fff;
  border-radius:50px;
  padding:18px 24px;
  font-family:'Playfair Display',serif;
  font-size:16px;
  letter-spacing:.08em;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 6px 28px rgba(43,41,40,.25);
  transition:transform .15s;
}
.land-cta:active{transform:scale(.98)}
.land-cta-star{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.land-lang{
  font-size:10px;
  letter-spacing:.35em;
  color:#9C8F86;
  margin-top:16px;
}

/* ══════════════════════════════
   INNER PAGES — SHARED
══════════════════════════════ */
.inner-page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}
.inner-page::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:.28;
  pointer-events:none;
}
.bg-shelf::before{background-image:url('./shelf-bg.png')}
.bg-notes::before{background-image:url('./notes-bg.png')}
.bg-vibe::before{background-image:url('./vibe-bg.png')}
.bg-quiz::before{background-image:url('./quiz-bg.png')}
.bg-results::before{background-image:url('./results-bg.png');opacity:.32}

/* NAV BAR */
.nav{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(244,227,209,.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 20px;
  border-bottom:1px solid rgba(227,201,169,.4);
}
.nav-back{
  display:flex;
  align-items:center;
  gap:5px;
  color:#9C8F86;
  font-size:13px;
  padding:4px;
}
.nav-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:14px;
  letter-spacing:.4em;
  color:#2B2928;
}
.nav-space{width:60px}

/* PROGRESS */
.progress{
  position:relative;
  z-index:1;
  padding:12px 20px 0;
}
.progress-text{font-size:10px;letter-spacing:.2em;color:#9C8F86;text-transform:uppercase;margin-bottom:8px}
.progress-bar{height:1px;background:#E3C9A9}
.progress-fill{height:1px;background:#C9A15E;transition:width .4s ease}
.progress-dots{display:flex;gap:6px;margin-top:8px}
.pdot{width:5px;height:5px;border-radius:50%;background:#E3C9A9;transition:all .25s}
.pdot.active{background:#C9A15E;transform:scale(1.4)}
.pdot.done{background:#e8d5b0}

/* PAGE BODY */
.page-body{
  position:relative;
  z-index:1;
  padding:24px 20px 48px;
  flex:1;
}
.pg-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#C9A15E;margin-bottom:14px}
.pg-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;line-height:1.25;margin-bottom:8px}
.pg-sub{font-size:13px;color:#9C8F86;margin-bottom:24px;line-height:1.5}

/* BUTTONS */
.btn-primary{
  width:100%;
  background:#2B2928;
  color:#fff;
  padding:16px;
  border-radius:6px;
  font-family:'Playfair Display',serif;
  font-size:15px;
  letter-spacing:.08em;
  transition:opacity .15s;
  margin-top:4px;
}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}
.btn-outline{
  width:100%;
  background:transparent;
  border:1px solid #E3C9A9;
  color:#9C8F86;
  padding:14px;
  border-radius:6px;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  transition:all .15s;
  margin-top:10px;
}
.btn-outline:hover{border-color:#C9A15E;color:#2B2928}

/* ══════════════════════════════
   PAGE: SHELF
══════════════════════════════ */
.shelf-input-row{display:flex;gap:10px;margin-bottom:14px}
.shelf-input{
  flex:1;
  background:rgba(255,255,255,.85);
  border:1.5px solid #E3C9A9;
  border-radius:10px;
  padding:13px 16px;
  font-size:14px;
  color:#2B2928;
  outline:none;
}
.shelf-input:focus{border-color:#C9A15E}
.shelf-input::placeholder{color:#B8ABA4}
.shelf-add{
  width:48px;height:48px;
  background:#2B2928;
  color:#fff;
  border-radius:10px;
  font-size:24px;
  line-height:1;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.shelf-empty{font-size:13px;color:#9C8F86;font-style:italic;padding:4px 0 18px}
.shelf-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.shelf-item{
  background:rgba(255,255,255,.75);
  border:1px solid #E3C9A9;
  border-radius:8px;
  padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:13px;
}
.shelf-remove{color:#C0B4AC;font-size:15px;padding:2px 6px}

/* ══════════════════════════════
   PAGE: NOTES
══════════════════════════════ */
.notes-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
  margin-bottom:14px;
}
.note-chip{
  background:rgba(255,255,255,.8);
  border:1.5px solid #E3C9A9;
  border-radius:12px;
  padding:13px 6px 11px;
  text-align:center;
  transition:all .15s;
}
.note-chip:active{transform:scale(.95)}
.note-chip.picked{border-color:#C9A15E;background:rgba(201,161,94,.1)}
.note-chip.hidden{display:none}
.note-ico{font-size:20px;margin-bottom:5px}
.note-lbl{font-size:10px;color:#2B2928}
.btn-more-notes{
  width:100%;
  background:transparent;
  border:1px solid #E3C9A9;
  color:#9C8F86;
  padding:11px;
  font-size:10px;
  letter-spacing:.15em;
  text-transform:uppercase;
  border-radius:8px;
  margin-bottom:14px;
  transition:all .15s;
}
.btn-more-notes:hover{border-color:#C9A15E}

/* ══════════════════════════════
   PAGE: VIBE
══════════════════════════════ */
.vibe-textarea{
  width:100%;
  min-height:130px;
  background:rgba(255,255,255,.85);
  border:1.5px solid #E3C9A9;
  border-radius:14px;
  padding:16px;
  font-size:14px;
  line-height:1.7;
  color:#2B2928;
  resize:none;
  outline:none;
}
.vibe-textarea:focus{border-color:#C9A15E}
.vibe-textarea::placeholder{color:#B8ABA4;font-style:italic}
.vibe-counter{text-align:right;font-size:11px;color:#9C8F86;margin:6px 0 18px}
.vibe-hints-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#9C8F86;margin-bottom:10px}
.vibe-hints{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.hint-chip{
  background:rgba(201,161,94,.12);
  border:1px solid rgba(201,161,94,.3);
  border-radius:20px;
  padding:7px 14px;
  font-size:12px;
  color:#2B2928;
  transition:background .15s;
}
.hint-chip:active{background:rgba(201,161,94,.25)}
.hint-hidden{display:none}

/* ══════════════════════════════
   PAGE: QUIZ
══════════════════════════════ */
.quiz-options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:24px;
}
.quiz-opt{
  background:rgba(255,255,255,.82);
  border:1.5px solid #E3C9A9;
  border-radius:14px;
  padding:14px 12px;
  text-align:left;
  transition:all .15s;
  display:flex;
  flex-direction:column;
  gap:5px;
}
.quiz-opt:active{transform:scale(.97)}
.quiz-opt.chosen{border-color:#C9A15E;background:rgba(201,161,94,.1);box-shadow:0 0 0 1px #C9A15E}
.quiz-opt-ico{font-size:22px;line-height:1}
.quiz-opt-name{font-family:'Playfair Display',serif;font-size:14px;color:#2B2928}
.quiz-opt-desc{font-size:10px;color:#9C8F86;line-height:1.4}

/* ══════════════════════════════
   PAGE: LOADING
══════════════════════════════ */
#pg-loading{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 28px;
  background:linear-gradient(160deg,#fff8f4 0%,#F4E3D1 55%,#ecdbc7 100%);
}
.loading-logo{font-family:'Playfair Display',serif;font-size:28px;letter-spacing:.2em;color:#2B2928;display:block;margin-bottom:6px}
.loading-subtitle{font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:#C9A15E;margin-bottom:56px}
/* Elegant golden ring spinner */
.loading-ring{
  width:120px;height:120px;
  border-radius:50%;
  border:1.5px solid rgba(201,161,94,.2);
  border-top-color:#C9A15E;
  border-right-color:rgba(201,161,94,.6);
  box-shadow:0 0 20px rgba(201,161,94,.15),0 0 60px rgba(201,161,94,.05);
  animation:spin 2s linear infinite;
  margin-bottom:56px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-style:italic;
  color:#5B514C;
  line-height:1.6;
}

/* ══════════════════════════════
   PAGE: RESULTS
══════════════════════════════ */
#pg-results{
  min-height:100vh;
  background:#F4E3D1;
  padding-bottom:80px;
  position:relative;
}
#pg-results::before{
  content:'';
  position:fixed;
  inset:0;
  max-width:430px;
  margin:0 auto;
  background:url('./results-bg.png') center top/cover no-repeat;
  opacity:.15;
  z-index:0;
  pointer-events:none;
}

/* AI INSIGHT CARD */
.insight-card{
  position:relative;z-index:1;
  margin:20px 16px 0;
  background:rgba(255,255,255,.78);
  border:1px solid rgba(201,161,94,.25);
  border-radius:20px;
  padding:22px 18px;
  backdrop-filter:blur(16px);
}
.insight-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(201,161,94,.1);
  border:1px solid rgba(201,161,94,.3);
  border-radius:20px;
  padding:5px 14px;
  margin-bottom:14px;
}
.insight-badge-dot{width:5px;height:5px;border-radius:50%;background:#C9A15E;animation:pulse 2s ease infinite}
.insight-badge-text{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#C9A15E}
.insight-quote{
  font-family:'Playfair Display',serif;
  font-size:15px;
  font-style:italic;
  line-height:1.8;
  color:#2B2928;
  margin-bottom:16px;
}
.insight-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.insight-pills{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.pill{
  background:rgba(201,161,94,.1);
  border:1px solid rgba(201,161,94,.3);
  border-radius:20px;
  padding:4px 10px;
  font-size:10px;
  color:#2B2928;
}
.insight-score{text-align:right}
.score-num{font-family:'Playfair Display',serif;font-size:22px;color:#2B2928;line-height:1;display:block}
.score-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#9C8F86}

/* PROFILE TAGS */
.profile-tags{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:10px 16px 0;
}
.profile-tag{
  background:rgba(255,255,255,.7);
  border:1px solid #E3C9A9;
  border-radius:10px;
  padding:10px 12px;
  display:flex;align-items:center;gap:8px;
}
.profile-tag-ico{font-size:16px}
.profile-tag-info{}
.profile-tag-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9C8F86;margin-bottom:2px}
.profile-tag-value{font-size:12px;font-weight:500;color:#2B2928}

/* SECTION HEADERS */
.section{position:relative;z-index:1;padding:26px 16px 0}
.section-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#C9A15E;margin-bottom:5px}
.section-title{font-family:'Playfair Display',serif;font-size:22px;color:#2B2928;margin-bottom:16px}

/* MATCH CARDS */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-card{
  background:rgba(255,255,255,.82);
  border:1.5px solid #E3C9A9;
  border-radius:16px;
  overflow:hidden;
  transition:transform .2s;
}
.match-card.top{border-color:#C9A15E;box-shadow:0 0 0 1px #C9A15E,0 4px 20px rgba(201,161,94,.12)}
.match-card-header{
  padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.match-card-header.dark{background:#2B2928}
.match-badge{font-size:8px;letter-spacing:.15em;text-transform:uppercase}
.match-badge.gold{color:#F2D28B}
.match-badge.gray{color:#9C8F86}
.match-price{font-size:10px;color:#C9A15E;letter-spacing:.1em}
.match-img{
  height:80px;
  background:linear-gradient(135deg,rgba(201,161,94,.07),rgba(244,227,209,.4));
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
}
.match-body{padding:12px}
.match-brand{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#9C8F86;margin-bottom:3px}
.match-name{font-family:'Playfair Display',serif;font-size:16px;color:#2B2928;line-height:1.2;margin-bottom:3px}
.match-family{font-size:10px;color:#C9A15E;margin-bottom:8px}
.match-why{font-size:11px;color:#6B5E54;line-height:1.6;font-style:italic;margin-bottom:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.match-notes{display:flex;flex-wrap:wrap;gap:4px}
.match-note{border:1px solid rgba(201,161,94,.3);border-radius:20px;padding:3px 8px;font-size:9px;color:#2B2928}

/* LAYERING CARD */
.layer-card{
  background:rgba(255,255,255,.78);
  border:1.5px solid #E3C9A9;
  border-radius:16px;
  padding:18px 16px;
  margin-bottom:12px;
}
.layer-label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#C9A15E;margin-bottom:14px}
.layer-visual{display:flex;align-items:flex-end;gap:8px;margin-bottom:16px}
.layer-bottle{
  flex:1;
  background:linear-gradient(135deg,rgba(201,161,94,.07),rgba(244,227,209,.3));
  border:1px solid rgba(201,161,94,.25);
  border-radius:12px;
  padding:13px 8px;
  text-align:center;
}
.layer-bottle-icon{font-size:22px;display:block;margin-bottom:5px}
.layer-bottle-name{font-size:11px;color:#2B2928;font-weight:500;line-height:1.3}
.layer-bottle-sub{font-size:10px;color:#9C8F86;margin-top:2px}
.layer-op{font-size:20px;color:#C9A15E;flex-shrink:0;padding-bottom:12px}
.layer-result-box{
  background:rgba(201,161,94,.06);
  border:1px solid rgba(201,161,94,.15);
  border-radius:10px;
  padding:13px;
}
.layer-result-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9C8F86;margin-bottom:5px}
.layer-result-text{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:#2B2928;line-height:1.75;margin-bottom:7px}
.layer-result-tip{font-size:11px;color:#9C8F86;line-height:1.6}

/* GUIDANCE CARD */
.guidance-card{
  background:rgba(255,255,255,.78);
  border:1.5px solid #E3C9A9;
  border-radius:16px;
  padding:18px 16px;
  margin-bottom:12px;
}
.guidance-title{font-family:'Playfair Display',serif;font-size:18px;color:#2B2928;margin-bottom:6px}
.guidance-text{font-size:12px;color:#6B5E54;line-height:1.65;font-style:italic;margin-bottom:14px}
.guidance-dirs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.guidance-dir{
  background:rgba(201,161,94,.07);
  border:1px solid rgba(201,161,94,.2);
  border-radius:10px;
  padding:12px 8px;
  text-align:center;
}
.guidance-dir-ico{font-size:20px;margin-bottom:5px}
.guidance-dir-name{font-size:11px;color:#2B2928;font-weight:500;margin-bottom:2px}
.guidance-dir-sub{font-size:10px;color:#9C8F86}

/* RECIPE CARD */
.recipe-card{
  background:#2B2928;
  border-radius:18px;
  padding:22px 18px;
  margin:24px 16px 0;
  position:relative;
  overflow:hidden;
}
.recipe-card::after{
  content:'';
  position:absolute;top:-50px;right:-50px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,161,94,.12),transparent 70%);
  pointer-events:none;
}
.recipe-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.recipe-title{font-family:'Playfair Display',serif;font-size:16px;color:#F2D28B;letter-spacing:.1em}
.recipe-share{color:rgba(255,255,255,.45);font-size:12px;letter-spacing:.08em}
.recipe-cols{display:grid;grid-template-columns:repeat(3,1fr)}
.recipe-col{padding:0 12px 0 0;border-right:1px solid rgba(255,255,255,.07)}
.recipe-col:nth-child(2){padding:0 12px}
.recipe-col:last-child{border:none;padding:0 0 0 12px}

function getRouteUrl(page, lang, quizStep) {
  const r = ROUTES[lang] || ROUTES.hr;
  if (page === 'quiz') return r[`quiz_${quizStep}`] || r.quiz_0;
  return r[page] || r.landing;
}

function parseRoute(path) {
  // Detect language
  const lang = path.startsWith('/en') ? 'en' : 'hr';
  const r = ROUTES[lang];

  // Match path to page
  for (const [page, url] of Object.entries(r)) {
    if (path === url || path === url + '/') {
      if (page.startsWith('quiz_')) {
        const step = parseInt(page.split('_')[1]);
        return { lang, page: 'quiz', quizStep: step };
      }
      return { lang, page };
    }
  }
  // Default: landing for that language
  return { lang, page: 'landing' };
}

function pushRoute(page, lang, quizStep) {
  const url = getRouteUrl(page, lang, quizStep ?? state.quizStep);
  if (window.location.pathname !== url) {
    try { window.history.pushState({ page, lang, quizStep }, '', url); } catch(e) {}
  }
}

// Handle browser back/forward
window.addEventListener('popstate', (e) => {
  // Always parse URL as source of truth — don't rely solely on e.state
  const route = (e.state?.page) ? e.state : parseRoute(window.location.pathname);
  Object.assign(state, {
    page: route.page || 'landing',
    lang: route.lang || state.lang,
    quizStep: route.quizStep ?? state.quizStep
  });
  render();
});

/* ─────────────── QUIZ ─────────────── */
function renderQuiz() {
  const step = STEPS[state.quizStep];
  const ans = state.answers[state.quizStep];
  const isMulti = step.multi;
  const isReady = isMulti ? (ans && ans.length > 0) : !!ans;
  const isLast = state.quizStep === STEPS.length - 1;
  const pct = ((state.quizStep + 1) / STEPS.length) * 100;

  const el = document.createElement('div');
  el.className = 'inner-page bg-quiz';
  el.appendChild(nav(() => {
    if (state.quizStep > 0) setState({ quizStep: state.quizStep - 1 });
    else goTo('vibe');
  }));

  const prog = document.createElement('div');
  prog.className = 'progress';
  prog.innerHTML = `
    <div class="progress-text">${t('step_label')} ${state.quizStep + 1} ${t('of')} ${STEPS.length}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-dots">
      ${STEPS.map((_, i) => `<div class="pdot${i < state.quizStep ? ' done' : i === state.quizStep ? ' active' : ''}"></div>`).join('')}
    </div>
  `;
  el.appendChild(prog);

  const body = document.createElement('div');
  body.className = 'page-body';
  body.innerHTML = `
    <div class="pg-label">${t('step_label')} ${state.quizStep + 1}</div>
    <h1 class="pg-title s">${step.question}</h1>
    <p class="pg-sub">${step.hint}</p>
    <div class="quiz-options">
      ${step.options.map(([ico, name, desc]) => {
        const sel = isMulti ? (ans && ans.includes(name)) : (ans === name);
        return `<div class="quiz-opt${sel ? ' chosen' : ''}" data-val="${name}">
          <div class="quiz-opt-ico">${ico}</div>
          <div class="quiz-opt-name s">${name}</div>
          <div class="quiz-opt-desc">${desc}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn-primary" id="quiz-next" ${isReady ? '' : 'disabled'}>
      ${isLast ? t('finish') : t('next')}
    </button>
  `;
  el.appendChild(body);

  el.querySelectorAll('.quiz-opt').forEach(opt => {
    opt.onclick = () => {
      const val = opt.dataset.val;
      let newAns;
      if (isMulti) {
        const cur = state.answers[state.quizStep] || [];
        newAns = cur.includes(val) ? cur.filter(v => v !== val) : [...cur, val];
      } else {
        newAns = val;
      }
      setState({ answers: { ...state.answers, [state.quizStep]: newAns } });
    };
  });
  el.querySelector('#quiz-next').onclick = () => {
    if (!isReady) return;
    if (isLast) analyze();
    else setState({ quizStep: state.quizStep + 1 });
  };
  return el;
}

/* ─────────────── RENDER ─────────────── */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const pages = {
    landing: renderLanding,
    shelf: renderShelf,
    notes: renderNotes,
    vibe: renderVibe,
    quiz: renderQuiz,
    loading: renderLoading,
    results: renderResults,
    profile: renderProfile
  };
  const fn = pages[state.page];
  if (fn) {
    const result = fn();
    if (result instanceof Promise) result.then(el => { app.innerHTML=''; app.appendChild(el); });
    else app.appendChild(result);
  }
}

/* ─────────────── LAYERING MODAL ─────────────── */
async function openLayeringModal(mainPerfume, mainBrand) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title s">Layering Lab ✦</div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-subtitle">Miješa s <strong>${mainPerfume}</strong> za različite ugođaje</div>
      <div class="modal-body">
        <div class="modal-loading">
          <div class="modal-loading-ring"></div>
          <div class="modal-loading-text s">Tražim savršene kombinacije...</div>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-close').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const sys = `Ti si SILLAGE ekspert za parfemski layering. Na temelju zadanog parfema, predloži 3 KONKRETNA prava parfema koja se mogu slojeviti s njim za RAZLIČITE ugođaje. Budi specifičan - predloži stvarne brendove i parfeme koji postoje. Vrati SAMO validan JSON na HRVATSKOM:
{
  "pairings": [
    {
      "mood": "naziv ugođaja (npr. Svježe & Ljetno)",
      "mood_emoji": "🌊",
      "brand": "Naziv brenda",
      "name": "Naziv parfema",
      "price": "~XX€ (stvarna okvirna cijena)",
      "effect": "Što nastaje kombinacijom - kratki poetski opis (1 rečenica)",
      "how": "Kratki praktični savjet kako ih nanijeti (1 rečenica)",
      "notes": ["nota1","nota2","nota3"]
    }
  ]
}`;

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:1000, system:sys,
        messages:[{role:'user', content:`Glavni parfem za layering: ${mainBrand} ${mainPerfume}. Predloži 3 konkretna prava parfema koji se dobro slažu s njim, svaki za drugačiji ugođaj.`}]})
    });
    const data = await res.json();
    const result = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    renderPairings(overlay, mainPerfume, result.pairings);
  } catch(e) {
    renderPairings(overlay, mainPerfume, [
      {mood:'Svježe & Morsko', mood_emoji:'🌊', brand:'Acqua di Parma', name:'Blu Mediterraneo Arancia di Capri', price:'~95€', effect:'Vanilijska slatkoća susreće mediteranski citrus — ljeto u bočici.', how:'2 prska Acqua di Parma na prsa, 1 prsk glavnog na vrat.', notes:['naranča','bergamot','morska sol']},
      {mood:'Duboko & Tajnovito', mood_emoji:'🌑', brand:'Maison Margiela', name:'Replica Jazz Club', price:'~120€', effect:'Toplina vanilije dobiva dimnu, jazzističku dušu — savršeno za večer.', how:'Glavni parfem prvo, Jazz Club kao završni sloj na zapešća.', notes:['duhan','rum','vanilija']},
      {mood:'Romantično & Cvjetno', mood_emoji:'🌸', brand:'Jo Malone', name:'Peony & Blush Suede', price:'~180€', effect:'Slatkoća se transformira u mekani cvjetni šapat — nježna, sofisticirana romanika.', how:'Jo Malone na kosu i dekolte, glavni na pulse točke.', notes:['božur','jabuka','suede']}
    ]);
  }
}

        <div style="background:linear-gradient(135deg,rgba(201,161,94,.08),rgba(244,227,209,.4));border-radius:14px;padding:18px;margin-bottom:20px;font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:#2B2928;line-height:1.75">"${perfume.why||''}"</div>

      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-close').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:600,
        system:`Predloži 3 slična parfema za zadani parfem. Vrati SAMO validan JSON bez markdowna: {"similar":[{"brand":"","name":"","price":"~XX€","why":"kratki razlog na HR","diff":"ključna razlika na HR"}]}`,
        messages:[{role:'user', content:`Parfem: ${perfume.brand} ${perfume.name} ${perfume.family||''}`}]})
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(text);
    renderSimilar(overlay, perfume, result.similar);
  } catch(e) {
    // Fallback s generičkim sličnim parfemima
    const fallback = [
      { brand: perfume.brand, name: 'Otkri sličnu liniju', price: '~'+perfume.price, why: 'Isti brend nudi slične mirise u svojoj kolekciji.', diff: 'Drugačiji intenzitet ili sezona' },
      { brand: 'Maison Margiela', name: 'Replica — istraži kolekciju', price: '~120€', why: 'Replica linija nudi autentične mirise za svaki vibe.', diff: 'Artizanalni pristup, manje komercijalnog' },
      { brand: 'Jo Malone', name: 'Istraži prema notama', price: '~150€', why: 'Jo Malone nudi kologne koje se savršeno layeraju.', diff: 'Laganiji, idealan za layering' }
    ];
    renderSimilar(overlay, perfume, fallback);
  }
}

function renderSimilar(overlay, perfume, similar) {
  overlay.querySelector('.modal-body').innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(201,161,94,.08),rgba(244,227,209,.4));border-radius:14px;padding:18px;margin-bottom:20px;font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:#2B2928;line-height:1.75">"${perfume.why||''}"</div>
    <div style="margin-bottom:16px"><div style="display:flex;flex-wrap:wrap;gap:6px">${(perfume.notes||[]).map(n=>`<span style="border:1px solid rgba(201,161,94,.3);border-radius:20px;padding:5px 12px;font-size:12px;color:#2B2928">${n}</span>`).join('')}</div></div>
    <div style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#9C8F86;margin-bottom:12px">Slični parfemi koji bi ti se svidjeli</div>
    ${similar.map((s,i)=>`
      <div style="background:rgba(255,255,255,.8);border:1px solid #E3C9A9;border-radius:12px;padding:14px;margin-bottom:10px">
        <div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#9C8F86;margin-bottom:2px">${s.brand}</div>
        <div style="font-family:'Playfair Display',serif;font-size:15px;color:#2B2928;margin-bottom:5px">${s.name} <span style="font-size:11px;color:#C9A15E">${s.price}</span></div>
        <div style="font-size:12px;color:#6B5E54;font-style:italic;margin-bottom:3px">${s.why}</div>
        <div style="font-size:11px;color:#C9A15E;margin-bottom:12px">↳ ${s.diff}</div>
        <div style="display:flex;gap:8px">
          <button class="sim-wishlist" data-i="${i}"
            style="flex:1;background:rgba(201,161,94,.08);border:1px solid rgba(201,161,94,.3);border-radius:8px;padding:9px;font-size:12px;color:#C9A15E;cursor:pointer">
            🤍 Wishlist
          </button>
          <button class="sim-select" data-i="${i}"
            style="flex:1;background:#2B2928;border:none;border-radius:8px;padding:9px;font-size:12px;color:#fff;cursor:pointer">
            ✦ Odaberi ovaj
          </button>
        </div>
      </div>`).join('')}`;

  overlay.querySelectorAll('.sim-wishlist').forEach(btn => {
    btn.addEventListener('click', async () => {
      const s = similar[parseInt(btn.dataset.i)];
      const ok = await saveToWishlist({ brand: s.brand, name: s.name, price: s.price, why: s.why });
      if (ok) { btn.innerHTML = '<span class="wish-added-txt"><span class="check-ico">✦</span> Dodano</span>'; btn.style.borderColor = 'rgba(212,175,55,.5)'; btn.style.boxShadow = '0 0 10px rgba(212,175,55,.2)'; }
      else openAuthModal();
    });
  });
  overlay.querySelectorAll('.sim-select').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = similar[parseInt(btn.dataset.i)];
      if (state.result) {
        state.result.top = { ...state.result.top, brand: s.brand, name: s.name, price: s.price, why: s.why };
      }
      overlay.remove();
      const toast = document.createElement('div');
      toast.textContent = `✦ ${s.name} postavljen kao tvoj top match`;
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2B2928;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;z-index:200;white-space:nowrap';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
      render();
    });
  });
}

/* ─────────────── AUTH MODAL ─────────────── */
function openAuthModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title s">${t('auth_title')}</div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="auth-modal-body">
        <div class="auth-tabs">
          <div class="auth-tab on" id="tab-login">${t('auth_login_tab')}</div>
          <div class="auth-tab" id="tab-register">${t('auth_register_tab')}</div>
        </div>
        <div id="auth-err" class="auth-err"></div>
        <div id="auth-ok" class="auth-ok"></div>
        <div class="auth-field">
          <div class="auth-label">${t('auth_email')}</div>
          <input class="auth-input" id="auth-email" type="email" placeholder="tvoj@email.com">
        </div>
        <div class="auth-field">
          <div class="auth-label">${t('auth_pass')}</div>
          <input class="auth-input" id="auth-pass" type="password" placeholder="••••••••">
        </div>
        <button class="btn-primary" id="auth-submit" style="margin-top:8px">Prijava</button>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #E3C9A9;text-align:center">
          <div style="font-size:11px;color:#9C8F86;margin-bottom:12px">ili nastavi s</div>
          <button id="auth-google" style="width:100%;background:white;border:1.5px solid #E3C9A9;border-radius:8px;padding:13px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button id="auth-magic" style="width:100%;background:rgba(201,161,94,.08);border:1.5px solid rgba(201,161,94,.3);border-radius:8px;padding:13px;font-size:13px;cursor:pointer;color:#2B2928;display:flex;align-items:center;justify-content:center;gap:8px">
            ✉️ Magic link (bez lozinke)
          </button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  let isLogin = true;
  const emailEl = overlay.querySelector('#auth-email');
  const passEl = overlay.querySelector('#auth-pass');
  const submitBtn = overlay.querySelector('#auth-submit');
  const errEl = overlay.querySelector('#auth-err');
  const okEl = overlay.querySelector('#auth-ok');

  overlay.querySelector('#modal-close').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.querySelector('#tab-login').onclick = () => {
    isLogin = true;
    overlay.querySelector('#tab-login').classList.add('on');
    overlay.querySelector('#tab-register').classList.remove('on');
    submitBtn.textContent = t('auth_submit_login');
  };
  overlay.querySelector('#tab-register').onclick = () => {
    isLogin = false;
    overlay.querySelector('#tab-register').classList.add('on');
    overlay.querySelector('#tab-login').classList.remove('on');
    submitBtn.textContent = t('auth_submit_reg');
  };

  submitBtn.onclick = async () => {
    const email = emailEl.value.trim();
    const pass = passEl.value;
    if (!email || !pass) { showErr(t('auth_err_empty')); return; }
    submitBtn.textContent = '...';
    submitBtn.disabled = true;
    errEl.classList.remove('show');
    let error;
    if (isLogin) {
      ({ error } = await sb.auth.signInWithPassword({ email, password: pass }));
    } else {
      ({ error } = await sb.auth.signUp({ email, password: pass }));
      if (!error) {
        okEl.textContent = 'Provjeri email za potvrdu registracije!';
        okEl.classList.add('show');
        submitBtn.textContent = isLogin ? 'Prijava' : 'Registracija';
        submitBtn.disabled = false;
        return;
      }
    }
    if (error) {
      showErr(error.message);
      submitBtn.textContent = isLogin ? 'Prijava' : 'Registracija';
      submitBtn.disabled = false;
    } else {
      overlay.remove();
    }
  };

  overlay.querySelector('#auth-google').onclick = async () => {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  };

  overlay.querySelector('#auth-magic').onclick = async () => {
    const email = emailEl.value.trim();
    if (!email) { showErr('Upiši email adresu.'); return; }
    const btn = overlay.querySelector('#auth-magic');
    btn.textContent = t('auth_magic_sending');
    btn.disabled = true;
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    if (error) {
      showErr(error.message);
      btn.textContent = t('auth_magic');
      btn.disabled = false;
    } else {
      okEl.textContent = t('auth_magic_sent');
      okEl.classList.add('show');
      btn.textContent = '✓ Link poslan';
    }
  };

  function showErr(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
}

async function renderProfile() {
  const el = document.createElement('div');
  el.className = 'profile-page';
  el.appendChild(nav(() => goTo('landing')));

  const header = document.createElement('div');
  header.style.cssText = 'padding:20px 16px 0';
  header.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div class="section-label">${t('profile_label')}</div>
        <div style="font-family:Playfair Display,serif;font-size:22px;color:#2B2928">${currentUser?.email?.split('@')[0]||'User'}</div>
        <div style="font-size:11px;color:#9C8F86;margin-top:2px">${currentUser?.email||''}</div>
      </div>
      <button id="logout-btn" style="background:transparent;border:1px solid #E3C9A9;color:#9C8F86;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer">${t('logout')}</button>
    </div>`;
  el.appendChild(header);

  const loading = document.createElement('div');
  loading.className = 'empty-state';
  loading.innerHTML = '<div class="modal-loading-ring" style="margin:20px auto"></div>';
  el.appendChild(loading);

  const [analyses, wishlist, layering] = await Promise.all([loadAnalyses(), loadWishlist(), loadLayeringCombos()]);
  loading.remove();

  const content = document.createElement('div');
  content.innerHTML = `
    <div class="profile-section">
      <div class="profile-sec-title s">${t('analyses_title')} (${analyses.length})</div>
      ${analyses.length === 0
        ? `<div class="empty-state">${t('analyses_empty').replace('\n','<br>')}</div>`
        : analyses.map(a => `<div class="saved-card" data-aid="${a.id}">
            <div class="saved-card-date">${new Date(a.created_at).toLocaleDateString('hr')}</div>
            <div class="saved-card-title s">${a.title}</div>
            <div class="saved-card-sub">${(a.result?.ai_insight||'').substring(0,80)}...</div>
            <div class="saved-card-pills">${(a.result?.keywords||[]).map(k=>`<span class="saved-pill">${k}</span>`).join('')}</div>
          </div>`).join('')}
    </div>
    <div class="profile-section" style="margin-top:8px">
      <div class="profile-sec-title s">${t('wishlist_title')} (${wishlist.length})</div>
      ${wishlist.length === 0
        ? `<div class="empty-state">${t('wishlist_empty').replace('\n','<br>')}</div>`
        : wishlist.map(w => `<div class="wishlist-item">
            <div class="wishlist-item-info">
              <div class="wishlist-brand">${w.brand}</div>
              <div class="wishlist-name s">${w.name}</div>
              <div class="wishlist-fam">${w.family||''} ${w.price_range?'· '+w.price_range:''}</div>
            </div>
            <div class="wishlist-actions">
              <a href="${w.notino_url||'#'}" target="_blank" class="btn-notino">${t('find_online')}</a>
              <button class="btn-remove" data-wid="${w.id}">✕</button>
            </div>
          </div>`).join('')}
    </div>
    <div class="profile-section" style="margin-top:8px">
      <div class="profile-sec-title s">${t('layering_saved')} (${layering.length})</div>
      ${layering.length === 0
        ? `<div class="empty-state">${t('layering_empty').replace('\n','<br>')}</div>`
        : layering.map(l => `<div class="saved-card">
            <div class="saved-card-date">${new Date(l.created_at).toLocaleDateString('hr')} · <span style="color:#C9A15E">${l.mood||''}</span></div>
            <div class="saved-card-title s">🫙 ${l.perfume_a} + ✨ ${l.perfume_b}</div>
            <div class="saved-card-sub">${l.result_desc||''}</div>
            ${l.tip ? `<div style="font-size:11px;color:#C9A15E;margin-top:5px">→ ${l.tip}</div>` : ''}
          </div>`).join('')}
    </div>
    <div style="height:60px"></div>`;
  el.appendChild(content);

  el.querySelector('#logout-btn')?.addEventListener('click', async () => {
    await sb.auth.signOut();
    goTo('landing');
  });
  el.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', async () => {
      await removeFromWishlist(btn.dataset.wid);
      btn.closest('.wishlist-item').remove();
    });
  });
  el.querySelectorAll('.saved-card').forEach(card => {
    card.addEventListener('click', () => {
      const a = analyses.find(x => x.id === card.dataset.aid);
      if (a) setState({ result: a.result, page: 'results' });
    });
  });
  return el;
}


// Parse URL on initial load
(function() {
  const path = window.location.pathname;
  if (path !== '/' && path !== '') {
    const route = parseRoute(path);
    state.lang = route.lang;
    state.page = route.page;
    if (route.quizStep !== undefined) state.quizStep = route.quizStep;
    // Store state so popstate always has e.state
    try { window.history.replaceState({ page: state.page, lang: state.lang, quizStep: state.quizStep }, '', path); } catch(e) {}
  } else {
    try { window.history.replaceState({ page: 'landing', lang: 'hr', quizStep: 0 }, '', '/hr'); } catch(e) {}
  }
})();


render();
