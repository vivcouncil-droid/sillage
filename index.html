<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SILLAGE | AI Perfume Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --cream:#F4E3D1;--card:#FFF9F2;--ink:#2B2928;--muted:#9C8F86;
  --gold:#C9A15E;--blush:#E9B7AA;--border:#E3C9A9;--gold-pale:#F2D28B;
  --text2:#6E625A;--text3:#5B514C;
}
html,body{min-height:100%;background:var(--cream);color:var(--ink);font-family:'Inter',sans-serif}
.sf{font-family:'Playfair Display',serif}

/* SHELL */
.shell{min-height:100vh;width:100%;position:relative;overflow-x:hidden;background:var(--cream)}
.shell-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat}
.shell-bg::after{content:'';position:absolute;inset:0;background:rgba(244,227,209,.55)}
.shell-inner{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:32px}
.shell-inner.compact{max-width:1024px}
/* Per-page backgrounds */
.page-landing .shell-bg{background-image:url('./landing-bg.jpg')}
.page-landing .shell-bg::after{background:rgba(244,227,209,.35)}
.page-shelf .shell-bg{background-image:url('./shelf-bg.jpg')}
.page-notes .shell-bg{background-image:url('./notes-bg.jpg')}
.page-vibe .shell-bg{background-image:url('./vibe-bg.jpg')}
.page-quiz .shell-bg{background-image:url('./quiz-bg.jpg')}
.page-loading .shell-bg{background-image:url('./loading-bg.jpg')}
.page-loading .shell-bg::after{background:rgba(244,227,209,.45)}
.page-result .shell-bg{background-image:url('./results-bg.jpg')}
.page-result .shell-bg::after{background:rgba(244,227,209,.6)}

/* LOGO */
.logo{text-align:center;letter-spacing:.32em}
.logo-main{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,56px);font-weight:400;display:block}
.logo-sub{display:block;margin-top:8px;font-size:clamp(10px,1.2vw,13px);letter-spacing:.55em;color:var(--gold);text-transform:uppercase}
.logo.sm .logo-main{font-size:clamp(20px,3vw,28px)}

/* TOPBAR */
.topbar{margin-bottom:56px;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 16px 16px;background:rgba(255,255,255,.2);padding:20px 24px;backdrop-filter:blur(8px)}
.topbar-back{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.topbar-back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}

/* LANDING */
.land-wrap{display:grid;min-height:760px;align-items:center;gap:24px}
@media(min-width:768px){.land-wrap{grid-template-columns:1fr 1fr}}
.land-headline{font-family:'Playfair Display',serif;font-size:clamp(48px,7vw,96px);line-height:.95;font-weight:400}
.land-headline em{font-style:italic;color:#B8746C;display:block}
.land-desc{margin-top:28px;max-width:480px;font-size:clamp(16px,2vw,22px);line-height:1.6;color:var(--text3)}
.btn-land{margin-top:40px;display:inline-block;border-radius:16px;background:var(--ink);padding:20px 40px;font-family:'Playfair Display',serif;font-size:clamp(16px,2vw,22px);color:#fff;border:none;cursor:pointer;box-shadow:0 0 30px rgba(233,183,170,.8);transition:transform .2s;-webkit-tap-highlight-color:transparent;letter-spacing:.05em}
.btn-land:hover{transform:scale(1.02)}
.land-lang{margin-top:28px;font-size:13px;letter-spacing:.3em;color:var(--muted)}

/* BOTTLE HERO — real photo */
.bottle-hero{position:relative;margin:0 auto;width:clamp(280px,45vw,520px);height:clamp(280px,45vw,520px);flex-shrink:0}
.bottle-photo{width:100%;height:100%;object-fit:contain;animation:float 6s ease-in-out infinite;filter:drop-shadow(0 20px 40px rgba(0,0,0,.15))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.icon-petal{position:absolute;pointer-events:none}
.icon-petal.p1{right:20px;top:80px;width:clamp(32px,5vw,56px);animation:drift1 8s ease-in-out infinite}
.icon-petal.p2{left:30px;top:140px;width:clamp(24px,3.5vw,40px);animation:drift2 10s ease-in-out infinite}
.icon-stars{position:absolute;top:40px;right:60px;width:clamp(40px,6vw,72px);animation:twinkle 3s ease-in-out infinite;pointer-events:none}
@keyframes drift1{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-8px)}}
@keyframes drift2{0%,100%{transform:rotate(8deg) translateY(0)}50%{transform:rotate(-8deg) translateY(-6px)}}
@keyframes twinkle{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* SHARED BUTTONS */
.btn-primary{width:100%;border-radius:12px;background:var(--ink);padding:clamp(18px,2.5vw,28px);font-family:'Playfair Display',serif;font-size:clamp(16px,2vw,22px);letter-spacing:.12em;color:#fff;border:none;cursor:pointer;transition:opacity .2s;-webkit-tap-highlight-color:transparent}
.btn-primary:hover{opacity:.9}
.btn-secondary{width:100%;border-radius:12px;border:1px solid var(--border);padding:clamp(14px,2vw,24px);font-size:clamp(12px,1.5vw,18px);letter-spacing:.3em;color:var(--muted);background:transparent;cursor:pointer;margin-top:24px;-webkit-tap-highlight-color:transparent}
.btn-secondary:hover{border-color:var(--gold)}

/* SHELF */
.shelf-grid{display:grid;align-items:center;gap:clamp(24px,4vw,48px)}
@media(min-width:768px){.shelf-grid{grid-template-columns:1.2fr .8fr}}
.shelf-bottle{display:none}
@media(min-width:768px){.shelf-bottle{display:flex;justify-content:center}}
.shelf-bottle-inner{width:176px;height:288px;border-radius:34px;border:1px solid var(--gold);background:linear-gradient(to bottom,rgba(255,255,255,.7),rgba(247,201,186,.3));box-shadow:0 20px 40px rgba(0,0,0,.15)}
.shelf-bottle-s{margin-top:112px;text-align:center;font-family:'Playfair Display',serif;font-size:72px;color:var(--gold)}
.lbl{letter-spacing:.55em;color:var(--gold);font-size:clamp(10px,1.2vw,13px);text-transform:uppercase;margin-bottom:24px}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,64px);font-weight:400}
.page-sub{margin-top:20px;max-width:640px;font-size:clamp(15px,1.8vw,22px);font-weight:600;color:var(--muted);line-height:1.4}
.cin-row{margin-top:clamp(24px,3vw,56px);display:flex;gap:24px}
.cin{flex:1;height:clamp(52px,7vw,80px);border-radius:16px;border:2px solid var(--border);background:rgba(255,255,255,.65);padding:0 clamp(14px,2vw,32px);font-size:clamp(14px,1.8vw,22px);outline:none;font-family:'Inter',sans-serif;color:var(--ink)}
.cin:focus{border-color:var(--gold)}
.cadd{width:clamp(52px,7vw,80px);height:clamp(52px,7vw,80px);border-radius:16px;background:var(--ink);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.cadd svg{width:clamp(20px,3vw,34px);height:clamp(20px,3vw,34px);stroke:#fff;fill:none;stroke-width:2}
.cempty{margin-top:clamp(16px,2vw,32px);font-size:clamp(14px,1.8vw,22px);font-style:italic;color:var(--muted)}
.clist{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.citem{background:rgba(255,255,255,.6);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;font-size:clamp(13px,1.5vw,18px)}
.crem{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px;-webkit-tap-highlight-color:transparent}

/* NOTES */
.notes-grid{margin-top:clamp(24px,3vw,56px);display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(12px,1.5vw,28px)}
@media(min-width:600px){.notes-grid{grid-template-columns:repeat(4,1fr)}}
.nchip{border-radius:24px;border:2px solid var(--border);background:rgba(255,255,255,.7);padding:clamp(16px,2vw,32px);text-align:center;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.nchip:hover,.nchip.sel{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.nchip.sel{background:rgba(201,161,94,.08)}
.nchip.hide{display:none}
.nchip-ico{font-size:clamp(24px,3.5vw,40px)}
.nchip-lbl{margin-top:clamp(8px,1vw,20px);font-size:clamp(13px,1.5vw,20px);font-weight:600}
.btn-more{margin-top:clamp(16px,2vw,40px);width:100%;border-radius:16px;border:1px solid var(--border);padding:clamp(16px,2vw,24px);font-size:clamp(12px,1.5vw,18px);letter-spacing:.3em;color:var(--muted);background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* VIBE */
.vtxt{margin-top:clamp(24px,3vw,56px);width:100%;height:clamp(160px,20vw,288px);border-radius:24px;border:2px solid var(--border);background:rgba(255,255,255,.7);padding:clamp(16px,2vw,40px);font-size:clamp(15px,1.8vw,24px);font-style:italic;line-height:1.6;outline:none;resize:none;font-family:'Inter',sans-serif;color:var(--ink);-webkit-appearance:none}
.vtxt:focus{border-color:var(--gold)}
.vtxt::placeholder{color:var(--muted)}
.vctr{margin-top:16px;text-align:right;font-size:clamp(13px,1.5vw,20px);color:var(--muted)}
.hints-lbl{margin-top:clamp(24px,3vw,40px);letter-spacing:.35em;color:var(--muted);font-size:clamp(10px,1.2vw,14px);text-transform:uppercase}
.hints{margin-top:24px;display:flex;flex-wrap:wrap;gap:clamp(8px,1vw,20px)}
.hchip{border-radius:9999px;background:#EFDDBE;padding:clamp(8px,1vw,16px) clamp(14px,2vw,32px);font-size:clamp(12px,1.5vw,20px);cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;color:var(--ink)}
.hchip:hover{background:#E5CE9E}

/* QUIZ */
.prog-txt{font-size:clamp(12px,1.5vw,20px);letter-spacing:.35em;color:var(--muted)}
.prog-bar-wrap{margin-top:20px;height:1px;background:var(--border)}
.prog-bar-fill{height:1px;background:var(--gold);transition:width .5s ease}
.prog-dots{margin-top:20px;display:flex;gap:16px}
.pdot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:all .3s}
.pdot.on,.pdot.done{background:var(--gold)}
.qlbl{letter-spacing:.55em;color:var(--gold);font-size:clamp(10px,1.2vw,13px);text-transform:uppercase}
.qtitle{margin-top:clamp(16px,2vw,32px);max-width:800px;font-family:'Playfair Display',serif;font-size:clamp(28px,4.5vw,60px);line-height:1.1;font-weight:400}
.qsub{margin-top:clamp(10px,1.2vw,20px);font-size:clamp(14px,1.8vw,24px);font-weight:600;color:var(--muted)}
.opts-grid{margin-top:clamp(32px,4vw,64px);display:grid;grid-template-columns:1fr 1fr;gap:clamp(12px,1.5vw,28px);margin-bottom:clamp(32px,4vw,56px)}
.opt{border-radius:24px;border:2px solid var(--border);background:rgba(255,255,255,.7);padding:clamp(16px,2vw,40px);text-align:left;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.opt:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.opt.sel{border-color:var(--gold);background:rgba(201,161,94,.08);box-shadow:0 0 0 1px var(--gold)}
.opt-ico{font-size:clamp(24px,3.5vw,40px)}
.opt-lbl{margin-top:clamp(12px,1.5vw,32px);font-family:'Playfair Display',serif;font-size:clamp(18px,2.5vw,36px);font-weight:400}
.opt-dsc{margin-top:clamp(6px,0.8vw,16px);font-size:clamp(12px,1.5vw,20px);font-weight:600;color:var(--muted)}
.btn-disabled{width:100%;border-radius:12px;background:#B6A696;padding:clamp(18px,2.5vw,28px);font-family:'Playfair Display',serif;font-size:clamp(16px,2vw,24px);color:#fff;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}

/* LOADING */
.lscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.lring{width:clamp(120px,15vw,200px);height:clamp(120px,15vw,200px);margin-top:80px;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{margin-top:60px;font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,36px);font-style:italic;color:var(--text3)}

/* RESULTS */
.rpage .logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(24px,3vw,48px)}
/* AI Insight */
.ai-section{border-radius:34px;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.45);padding:clamp(20px,2.5vw,40px);box-shadow:0 20px 40px rgba(0,0,0,.05);backdrop-filter:blur(16px)}
.ai-inner{display:grid;gap:clamp(16px,2vw,40px)}
@media(min-width:768px){.ai-inner{grid-template-columns:1fr .4fr}}
.ai-badge{display:inline-flex;border-radius:9999px;border:1px solid var(--border);background:rgba(255,255,255,.5);padding:8px 24px;font-size:clamp(10px,1.2vw,13px);letter-spacing:.25em;color:var(--gold);margin-bottom:clamp(12px,1.5vw,40px)}
.ai-quote{font-family:'Playfair Display',serif;font-size:clamp(16px,2vw,32px);font-style:italic;line-height:1.55;max-width:720px}
.spills{margin-top:clamp(16px,2vw,32px);display:flex;flex-wrap:wrap;gap:clamp(8px,1vw,16px)}
.spill{border-radius:9999px;border:1px solid var(--gold);background:rgba(255,255,255,.6);padding:clamp(6px,.8vw,10px) clamp(12px,1.5vw,20px);font-size:clamp(10px,1.2vw,14px)}
/* YOUR PROFILE */
.profile-box{border-radius:24px;border:1px solid var(--border);background:rgba(255,255,255,.6);padding:clamp(16px,2vw,32px)}
.profile-box-ttl{font-size:clamp(10px,1.2vw,13px);letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.prow{margin-top:clamp(12px,1.5vw,20px)}
.prow-lbl{color:var(--muted);font-size:clamp(11px,1.2vw,14px)}
.prow-val{font-weight:600;font-size:clamp(13px,1.5vw,17px);margin-top:2px}
/* Matches */
.matches-grid{display:grid;gap:clamp(16px,2vw,32px);margin-top:clamp(20px,2.5vw,32px)}
@media(min-width:768px){.matches-grid{grid-template-columns:1fr 1fr}}
.mcard{overflow:hidden;border-radius:16px;background:rgba(255,255,255,.75)}
.mcard.hero{border:1px solid var(--gold);box-shadow:0 0 24px rgba(201,161,94,.28)}
.mcard.alt{border:1px solid var(--border)}
.mcard-badge{display:flex;justify-content:space-between;padding:clamp(8px,1vw,12px) clamp(12px,1.5vw,20px);background:var(--ink);font-size:clamp(9px,1vw,12px);letter-spacing:.28em;color:var(--gold-pale);text-transform:uppercase}
.mcard-inner{display:grid;gap:clamp(12px,1.5vw,16px);padding:clamp(16px,2vw,32px)}
@media(min-width:480px){.mcard-inner{grid-template-columns:.9fr 1.1fr}}
.mcard-img{min-height:clamp(120px,15vw,224px);display:flex;align-items:center;justify-content:center;border-radius:16px;background:linear-gradient(135deg,#F7EBDD,rgba(242,201,190,.35));font-size:clamp(40px,6vw,80px)}
.mbrand{font-size:clamp(9px,1vw,12px);letter-spacing:.25em;color:#B8746C;text-transform:uppercase;margin-bottom:8px}
.mname{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,40px);font-weight:400;margin-bottom:4px}
.mfam{color:#B8746C;font-size:clamp(11px,1.3vw,15px);margin-bottom:clamp(12px,1.5vw,24px)}
.mwhy{line-height:1.6;color:var(--text2);font-size:clamp(12px,1.4vw,16px);margin-bottom:clamp(12px,1.5vw,32px)}
.mnotes{display:flex;flex-wrap:wrap;gap:8px}
.ntag{border-radius:9999px;border:1px solid var(--gold);padding:4px clamp(10px,1.2vw,16px);font-size:clamp(9px,1vw,13px)}
/* Layering */
.layer-card{margin-top:clamp(12px,1.5vw,24px);border-radius:24px;border:1px solid var(--border);background:rgba(255,255,255,.6);padding:clamp(16px,2vw,32px)}
.layer-grid{display:grid;align-items:center;gap:clamp(10px,1.5vw,24px);grid-template-columns:1fr auto 1fr auto 1fr;margin-bottom:clamp(16px,2vw,24px)}
@media(min-width:640px){.layer-grid{grid-template-columns:1fr auto 1fr auto 1fr 1.4fr}}
.lbottle{text-align:center}
.lbico{font-size:clamp(32px,5vw,64px);display:block;margin-bottom:clamp(8px,1vw,16px)}
.lbname{font-size:clamp(12px,1.4vw,16px);font-weight:600}
.lbsub{font-size:clamp(10px,1.2vw,13px);color:var(--text2)}
.lop{font-size:clamp(18px,2.5vw,30px);color:var(--ink)}
.layer-extra{display:none}
@media(min-width:640px){.layer-extra{display:block}}
.layer-extra-lbl{font-size:clamp(9px,1vw,12px);letter-spacing:.25em;color:#B8746C;text-transform:uppercase;margin-bottom:clamp(10px,1.2vw,20px)}
.layer-extra-txt{font-size:clamp(13px,1.5vw,20px);line-height:1.6}
.btn-layer{margin-top:clamp(12px,1.5vw,24px);border-radius:12px;border:1px solid var(--gold);padding:clamp(10px,1.2vw,14px) clamp(16px,2vw,24px);font-size:clamp(12px,1.3vw,16px);background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
/* Guidance */
.guidance-card{margin-top:clamp(12px,1.5vw,24px);border-radius:24px;border:1px solid var(--border);background:rgba(255,255,255,.6);padding:clamp(16px,2vw,32px)}
.guidance-inner{display:grid;gap:clamp(16px,2vw,32px)}
@media(min-width:768px){.guidance-inner{grid-template-columns:1.2fr 1.8fr}}
.guidance-lbl{letter-spacing:.35em;color:var(--gold);font-size:clamp(9px,1vw,12px);text-transform:uppercase;margin-bottom:clamp(12px,1.5vw,20px)}
.guidance-title{font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,32px);font-weight:400;margin-bottom:clamp(12px,1.5vw,20px)}
.guidance-txt{color:var(--text2);font-size:clamp(13px,1.5vw,17px);line-height:1.6}
.dirs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,1.5vw,24px)}
.dir-card{border-radius:16px;background:rgba(255,255,255,.5);padding:clamp(14px,1.8vw,24px);text-align:center}
.dir-ico{font-size:clamp(24px,3vw,40px);margin-bottom:clamp(8px,1vw,14px)}
.dir-name{font-weight:600;font-size:clamp(12px,1.4vw,18px);margin-bottom:4px}
.dir-sub{font-size:clamp(10px,1.2vw,13px);color:var(--muted)}
/* Recipe */
.recipe{margin-top:clamp(24px,3vw,56px);border-radius:24px;background:var(--ink);padding:clamp(20px,2.5vw,32px);color:#fff;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.recipe-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(20px,2.5vw,32px)}
.recipe-ttl{font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,32px);color:var(--gold-pale)}
.recipe-acts{display:flex;gap:16px}
.ract{background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.6);-webkit-tap-highlight-color:transparent}
.ract svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.ract:hover{color:#fff}
.recipe-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,1.5vw,24px)}
.rcol{border-radius:16px;border:1px solid rgba(201,161,94,.3);padding:clamp(14px,1.8vw,24px)}
.rcol-lbl{font-size:clamp(9px,1vw,12px);letter-spacing:.3em;color:var(--gold-pale);text-transform:uppercase;margin-bottom:clamp(10px,1.2vw,16px)}
.rcol-val{font-size:clamp(12px,1.4vw,17px);line-height:1.6}
/* Bottom CTAs */
.bottom-ctas{margin-top:clamp(32px,4vw,40px);display:flex;justify-content:center;gap:24px;flex-wrap:wrap}

<div id="app"></div>
<script>
const NOTES=[

    ['🌸','Proljeće','Cvjetno, svježe, nježno'],['☀️','Ljeto','Morsko, lagano, citrus'],
    ['🍂','Jesen','Toplo, začinjeno, amber'],['❄️','Zima','Duboko, kožno, dimno']]},

    ['🪷','Nježan','Blizak, intiman'],['🌺','Umjeren','Prisutan, ugodan'],
    ['💥','Jak','Upečatljiv, dalekosežan'],['🎭','Ovisi','Prilagodljiv, kontekstualan']]}
];
const HINTS=['Kiša na toplom asfaltu','Stara biblioteka i koža','Jutarnja kava i drvo','Ljetna noć na moru','Cvijeće nakon grmljavine'];

let S={page:'landing',qi:0,ans:{},vibe:'',notes:[],notesX:false,coll:[],cin:'',res:null,lmsg:''};
const go=p=>{S.page=p;window.scrollTo({top:0,behavior:'smooth'});render()};
const ss=p=>{Object.assign(S,p);render()};

function applyBg(kw){
  // Dynamic background via CSS var could be added later
}

/* SVG icons */
const ICO={
  back:`<svg viewBox="0 0 24 24"><polyline points="19 12 5 12"/><polyline points="12 5 5 12 12 19"/></svg>`,
  bookmark:`<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>`,
  share:`<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
  plus:`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`
};

function Logo(sm=false){
  return`<div class="logo${sm?' sm':''}"><span class="logo-main sf">SILLAGE</span><span class="logo-sub">AI Perfume Expert</span></div>`;
}
function TopBar(backFn){
  return`<div class="topbar"><button class="topbar-back" id="backBtn">${ICO.back} Natrag</button>${Logo(true)}<div style="width:96px"></div></div>`;
}
function Shell(content,compact=false,page=''){
  return`<div class="shell page-${page}"><div class="shell-bg"></div><div class="shell-inner${compact?' compact':''}">${content}</div></div>`;
}

/* LANDING */
function landingPage(){
  const html=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">${Logo(true)}</div>
    <div class="land-wrap">
      <div>
        <h1 class="land-headline sf">Your scent,<br><em>decoded.</em></h1>
        <p class="land-desc">AI-crafted fragrance profile prilagođen tvojim emocijama, uspomenama i željama.</p>
        <button class="btn-land" id="goShelf">Saznaj svoj recept ✦</button>
        <div class="land-lang">HR | EN</div>
      </div>
      <div class="bottle-hero">
        <img src="./bottle-hero.jpg" class="bottle-photo" alt="SILLAGE">
        <img src="./icon-petal.png" class="icon-petal p1" alt="">
        <img src="./icon-petal.png" class="icon-petal p2" alt="" style="transform:scaleX(-1)">
        <img src="./icon-stars.png" class="icon-stars" alt="">
      </div>
    </div>`;
  const d=document.createElement('div');
  d.innerHTML=Shell(html,false,'landing');
  d.querySelector('#goShelf').onclick=()=>go('shelf');
  return d;
}

/* SHELF */
function shelfPage(){
  const itemsHtml=S.coll.length===0
    ?`<p class="cempty">Još nisi dodao/la ništa.</p>`
    :`<div class="clist">${S.coll.map((x,i)=>`<div class="citem"><span>🫙 ${x}</span><button class="crem" data-i="${i}">✕</button></div>`).join('')}</div>`;
  const html=`
    ${TopBar()}
    <div class="shelf-grid">
      <div>
        <div class="lbl">DIGITALNA POLICA</div>
        <h1 class="page-title sf">Što već imaš?</h1>
        <p class="page-sub">Dodaj parfeme koje posjeduješ — AI će maksimizirati tvoju kolekciju kroz layering.</p>
        <div class="cin-row">
          <input class="cin" id="ci" placeholder='npr. "Dior Sauvage EDT"' value="${S.cin||''}">
          <button class="cadd" id="cadd">${ICO.plus}</button>
        </div>
        ${itemsHtml}
        <button class="btn-primary" id="goNotes" style="margin-top:56px">Analiziraj moj profil ✦</button>
        <button class="btn-secondary" id="skipNotes">PRESKOČI I ANALIZIRAJ</button>
      </div>
      <div class="shelf-bottle">
        <img src="./bottle-hero.jpg" style="width:200px;height:auto;object-fit:contain;filter:drop-shadow(0 12px 24px rgba(0,0,0,.1))" alt="SILLAGE">
      </div>
    </div>`;
  const d=document.createElement('div');d.innerHTML=Shell(html,true,'shelf');
  d.querySelector('#backBtn').onclick=()=>go('landing');
  const inp=d.querySelector('#ci');
  inp.oninput=()=>{S.cin=inp.value};
  inp.onkeydown=e=>{if(e.key==='Enter')addItem()};
  function addItem(){const v=(S.cin||'').trim();if(v)ss({coll:[...S.coll,v],cin:''})}
  d.querySelector('#cadd').onclick=addItem;
  d.querySelectorAll('.crem').forEach(b=>{b.onclick=()=>ss({coll:S.coll.filter((_,i)=>i!==parseInt(b.dataset.i))})});
  d.querySelector('#goNotes').onclick=()=>go('notes');
  d.querySelector('#skipNotes').onclick=()=>go('notes');
  return d;
}

/* NOTES */
function notesPage(){
  const sel=S.notes,sx=S.notesX;
  const html=`

    <div class="lbl">NOTE PICKER</div>
    <h1 class="page-title sf" style="margin-top:32px">Odaberi note koje te privlače</h1>
    <p class="page-sub">Možeš odabrati više, ili preskočiti.</p>
    <div class="notes-grid">
      ${NOTES.map((n,i)=>`<button class="nchip${sel.includes(n[1])?' sel':''}${(!sx&&i>=12)?' hide':''}" data-n="${n[1]}"><div class="nchip-ico">${n[0]}</div><div class="nchip-lbl">${n[1]}</div></button>`).join('')}

  d.querySelectorAll('.nchip').forEach(c=>{c.onclick=()=>{const n=c.dataset.n;ss({notes:sel.includes(n)?sel.filter(x=>x!==n):[...sel,n]})}});
  d.querySelector('#goVibe').onclick=()=>go('vibe');
  d.querySelector('#skipVibe').onclick=()=>go('vibe');
  const sm=d.querySelector('#showMore');if(sm)sm.onclick=()=>ss({notesX:true});
  return d;
}

/* VIBE */
function vibePage(){
  const html=`
    ${TopBar()}
    <div class="lbl">THE VIBE BOX</div>
    <h1 class="page-title sf" style="margin-top:32px">Opiši svoj vibe</h1>
    <p class="page-sub">Napiši što želiš da tvoj idealni miris opisuje, osjeća se, podsjeća na...</p>

  ta.oninput=()=>{S.vibe=ta.value;vc.textContent=`${ta.value.length}/300`};
  d.querySelectorAll('.hchip').forEach(c=>{c.onclick=()=>{ta.value=c.dataset.h;S.vibe=c.dataset.h;vc.textContent=`${c.dataset.h.length}/300`}});
  d.querySelector('#goQuiz').onclick=()=>ss({page:'quiz',qi:0,ans:{}});
  return d;
}

/* QUIZ */
function quizPage(){
  const step=QUIZ[S.qi],ans=S.ans[S.qi],isMul=step.t==='m';
  const ok=isMul?(ans&&ans.length>0):!!ans;
  const isLast=S.qi===QUIZ.length-1;
  const html=`
    ${TopBar()}
    <div>
      <div class="prog-txt">KORAK ${S.qi+1} OD 4</div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${(S.qi+1)*25}%"></div></div>
      <div class="prog-dots">${[0,1,2,3].map(i=>`<div class="pdot${i<=S.qi?' on':''}"></div>`).join('')}</div>
    </div>
    <div style="margin-top:clamp(24px,3vw,56px)">
      <div class="qlbl">${step.k}</div>
      <h1 class="qtitle sf">${step.q}</h1>
      <p class="qsub">${step.s}</p>
      <div class="opts-grid">
        ${step.opts.map(([ico,lbl,dsc])=>{
          const v=lbl;
          const sel=isMul?(ans&&ans.includes(v)):(ans===v);
          return`<button class="opt${sel?' sel':''}" data-v="${v}"><div class="opt-ico">${ico}</div><div class="opt-lbl sf">${lbl}</div><div class="opt-dsc">${dsc}</div></button>`;
        }).join('')}
      </div>
      <button class="${ok?'btn-primary':'btn-disabled'}" id="nextBtn">${isLast?'Završi →':'Dalje →'}</button>
    </div>`;
  const d=document.createElement('div');d.innerHTML=Shell(html,true,'quiz');
  d.querySelector('#backBtn').onclick=()=>S.qi>0?ss({qi:S.qi-1}):go('vibe');
  d.querySelectorAll('.opt').forEach(c=>{c.onclick=()=>{
    const v=c.dataset.v;
    if(isMul){const cur=S.ans[S.qi]||[];ss({ans:{...S.ans,[S.qi]:cur.includes(v)?cur.filter(x=>x!==v):[...cur,v]}})}
    else ss({ans:{...S.ans,[S.qi]:v}});
  }});
  d.querySelector('#nextBtn').onclick=()=>{if(!ok)return;isLast?analyze():ss({qi:S.qi+1})};
  return d;
}

/* LOADING */

/* ANALYZE */
async function analyze(){

  let mi=0;
  ss({page:'loading',lmsg:msgs[0]});
  const iv=setInterval(()=>{mi=(mi+1)%msgs.length;const el=document.getElementById('lm');if(el)el.textContent=msgs[mi]},2200);

  const sd={user_context:{collection:S.coll,vibe_description:S.vibe||'not provided',preferences:{family:S.ans[0],season:S.ans[1],occasion:S.ans[2],intensity:S.ans[3],notes:S.notes}}};
  const h2=S.coll.length>=2;

  const sys=`You are SILLAGE — a world-class luxury AI perfume expert. Write like a master perfumer for a luxury brand. All text in Croatian (HR) EXCEPT: brand names, perfume names, scent family names stay in original language. Return ONLY valid JSON no markdown:

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1400,system:sys,messages:[{role:'user',content:JSON.stringify(sd)}]})});
    const data=await r.json();
    const txt=data.content[0].text.replace(/```json|```/g,'').trim();
    clearInterval(iv);
    ss({res:JSON.parse(txt),page:'result'});
  }catch(e){
    clearInterval(iv);
    ss({res:{match_score:92,ai_insight:"Privlači te efemerna magija mediteranskih ljeta, gdje sol целива kožu a jasmin teška noćni zrak. Tvoja mirisna duša žudi za opojnom slatkoćom koja pleše između oceanskog povjetarca i romantike uz zvjezdano nebo.",scent_keywords:["mediterranean nights","ocean breeze","jasmine intoxication","summer romance","seaside"],profile:{intensity:"Umjeren 🌺",season:"Ljeto ☀️",occasion:"Večernji 🌙",notes:"Vanilija, Jasmin, Mošus"},top_match:{brand:"TOM FORD",name:"Soleil Blanc",concentration:"EDP",scent_family:"Solar Floral",price_range:"$$$$",reasoning:"Kao tekući mjesečev sjaj na toploj koži — kremasta slatkoća kokosa omotana u ylang-ylang i jasmin, s laganim mediteranskim povjetarcem.",key_notes:["kokos","ylang-ylang","jasmin","morska sol"]},second_match:{brand:"ESCADA",name:"Island Kiss",concentration:"EDT",scent_family:"Fruity Floral",price_range:"$$",reasoning:"Tvoj ulaz u primorsku slatkoću — tropski passion fruit i kokos stvaraju savršenu ljetnu noćnu sanjariju.",key_notes:["passion fruit","kokos","frangipani"]},layering:{a:S.coll[0]||"tvoj omiljeni miris",a_sub:"Fresh, kremaste cvjetne note",b:"Parma Blu Mediterraneo",b_sub:"Morski pojačivač dubine",result:"Oceanski povjetarac koji se sleđe u cvjetnu vaniliju.",instruction:"Prskaj Parma Blu na prsa, tvoj miris na zapešća — neka se spoje na koži."},guidance:{emoji:"🌊",title:"Solar Florals & Aquatic Gourmands",text:"Počni s laganijom tropskom slatkoćom, zatim evoluiraj prema sofisticiranijim morskim cvjetovima — tvoje sljedeće poglavlje treba zagrliti bijele cvijetove целоване morskim prskanjem.",dirs:[{ico:"🍋",name:"Citrus Marine",sub:"Svjež & Energičan"},{ico:"🌸",name:"White Florals",sub:"Lagan & Elegantan"},{ico:"🌿",name:"Soft Woods",sub:"Topao & Utješan"}]},recipe:{notes:"Lagane, svježe note koje evociraju ljetne noći uz more",slozi:"Kombinacija morskih i cvjetnih nota s vanilijom za posebne prilike",istrazi:"Istražite svježi cvjetni profil s vanilla bazom"}},page:'result'});
  }

            <div class="layer-extra-lbl">UPSELL LAYERING · NADOGRADNJA KOLEKCIJE</div>
            <div class="layer-extra-txt">${lay.instruction||''}</div>
            <button class="btn-layer">Explore layering tips →</button>
          </div>
        </div>
      </div>

      <!-- Strategic Guidance -->
      ${r.guidance?`<div class="guidance-card">
        <div class="guidance-inner">
          <div>
            <div class="guidance-lbl">STRATEGIC GUIDANCE · TVOJ SLJEDEĆI SMJER</div>
            <h3 class="guidance-title sf">${r.guidance.title||r.guidance.headline||''}</h3>
            <p class="guidance-txt">${r.guidance.text||r.guidance.advice||''}</p>
          </div>
          <div>
            <div class="dirs-grid">${(r.guidance.dirs||r.guidance.directions||[]).map(dir=>`<div class="dir-card"><div class="dir-ico">${dir.ico||dir.emoji||'✦'}</div><div class="dir-name">${dir.name}</div><div class="dir-sub">${dir.sub}</div></div>`).join('')}</div>
          </div>
        </div>
      </div>`:''}

      <!-- Scent Recipe -->
      <div class="recipe">
        <div class="recipe-hdr">
          <div class="recipe-ttl sf">✦ Tvoj Scent Recipe</div>
          <div class="recipe-acts">
            <button class="ract" id="saveBtn" title="Spremi">${ICO.bookmark}</button>
            <button class="ract" id="shareBtn" title="Podijeli">${ICO.share}</button>
          </div>
        </div>
        <div class="recipe-cols">
          <div class="rcol"><div class="rcol-lbl">NOSI</div><div class="rcol-val">${r.recipe?.notes||''}</div></div>
          <div class="rcol"><div class="rcol-lbl">SLOŽI</div><div class="rcol-val">${r.recipe?.slozi||''}</div></div>
          <div class="rcol"><div class="rcol-lbl">ISTRAŽI</div><div class="rcol-val">${r.recipe?.istrazi||''}</div></div>
        </div>
      </div>

      <!-- Bottom CTAs -->
      <div class="bottom-ctas">
        <button class="btn-refine" id="rfBtn">Refine your scent ✦</button>
        <button class="btn-explore" id="exBtn">Explore another vibe</button>
      </div>
    </div>`;

  d.innerHTML=Shell(html,false,'result');
  d.querySelector('#viewMatches').onclick=()=>d.querySelector('#matchesAnchor').scrollIntoView({behavior:'smooth'});
  d.querySelector('#rfBtn').onclick=()=>go('vibe');
  d.querySelector('#exBtn').onclick=()=>go('quiz');
  d.querySelector('#shareBtn').onclick=()=>{if(navigator.share)navigator.share({title:'Moj SILLAGE Scent Recipe',url:location.href});else{navigator.clipboard?.writeText(location.href);alert('Link kopiran!')}};
  d.querySelector('#saveBtn').onclick=()=>alert('Profil spremen! (soon: export PDF)');
  return d;
}

function render(){
  const app=document.getElementById('app');if(!app)return;
  app.innerHTML='';
  const fns={landing:landingPage,shelf:shelfPage,notes:notesPage,vibe:vibePage,quiz:quizPage,loading:loadingPage,result:resultPage};
  const fn=fns[S.page];
  if(fn)app.appendChild(fn());
}

render();
</script>
</body>
</html>
