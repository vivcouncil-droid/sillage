<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SILLAGE | AI Perfume Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow-x:hidden;background:#F4E3D1;color:#2B2928;font-family:'Inter',sans-serif}

/* ─── APP WRAPPER ─── */
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

/* ─── SCREEN BASE ─── */
.screen{min-height:100vh;width:100%;position:relative;display:flex;flex-direction:column;overflow:hidden}
.screen-bg{position:absolute;inset:0;background-size:cover;background-position:center top;background-repeat:no-repeat}
.screen-overlay{position:absolute;inset:0}
.screen-content{position:relative;z-index:2;display:flex;flex-direction:column;flex:1}

/* ─── TYPOGRAPHY ─── */
.sf{font-family:'Playfair Display',serif}
.gold{color:#C9A15E}
.muted{color:#9C8F86}

/* ═══════════════════════════
   01 LANDING
═══════════════════════════ */
.land-bg{background-image:none;background:linear-gradient(160deg,#fff8f4 0%,#F4E3D1 55%,#ecdbc7 100%)}
/* Gradient: top clear → bottom cream (covers any image text at bottom) */
.land-overlay{display:none}

.land-top{padding:36px 28px 0;display:flex;align-items:center;justify-content:space-between}
.land-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;letter-spacing:.18em;color:#2B2928}
.land-logo-tag{font-size:8px;letter-spacing:.4em;color:#C9A15E;text-transform:uppercase;margin-top:3px}

.land-body{margin-top:auto;padding:0 28px 52px}
.land-h1{font-family:'Playfair Display',serif;font-size:38px;font-weight:400;line-height:1.1;color:#2B2928;margin-bottom:8px}
.land-h1 em{font-style:italic;color:#B8746C;display:block}
.land-rule{width:20px;height:1px;background:#C9A15E;margin:16px 0;opacity:.9}
.land-desc{font-size:14px;color:#5B514C;line-height:1.65;margin-bottom:32px;max-width:260px}
.btn-land{display:inline-flex;align-items:center;gap:10px;background:#2B2928;color:#fff;border:none;padding:17px 36px;font-family:'Playfair Display',serif;font-size:15px;letter-spacing:.1em;border-radius:50px;cursor:pointer;box-shadow:0 0 28px rgba(233,183,170,.7);transition:transform .2s;width:100%;justify-content:center}
.btn-land:active{transform:scale(.98)}
.btn-spark{animation:sp 2s ease-in-out infinite;font-size:13px}
@keyframes sp{0%,100%{opacity:.4}50%{opacity:1}}
.land-lang{font-size:10px;letter-spacing:.3em;color:rgba(92,81,76,.5);margin-top:16px;text-align:center}

/* ═══════════════════════════
   HEADER (all inner screens)
═══════════════════════════ */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0;position:sticky;top:0;z-index:10;background:rgba(244,227,209,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hdr-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:#9C8F86;font-size:13px;cursor:pointer;padding:4px;font-family:'Inter',sans-serif}
.hdr-back svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hdr-logo{font-family:'Playfair Display',serif;font-size:14px;letter-spacing:.4em;color:#2B2928}

/* ═══════════════════════════
   PROGRESS BAR
═══════════════════════════ */
.prog{padding:12px 20px 0}
.prog-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#9C8F86;margin-bottom:8px}
.prog-track{height:1px;background:#E3C9A9;border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:#C9A15E;transition:width .5s ease}
.prog-dots{display:flex;gap:6px;margin-top:8px}
.dot{width:5px;height:5px;border-radius:50%;background:#E3C9A9;transition:all .3s}
.dot.on{background:#C9A15E;transform:scale(1.4)}
.dot.done{background:#E8D5B0}

/* ═══════════════════════════
   INNER PAGE BODY
═══════════════════════════ */
.pg{padding:24px 20px 40px;flex:1}
.pg-lbl{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#C9A15E;margin-bottom:14px}
.pg-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;line-height:1.25;margin-bottom:8px}
.pg-sub{font-size:13px;color:#9C8F86;margin-bottom:24px;line-height:1.5}

/* Inner screen backgrounds */
.shelf-bg-wrap .hdr,.shelf-bg-wrap .prog{background:rgba(244,227,209,.88)}
.bg-shelf{background-image:url('./shelf-bg.jpg')}
.bg-notes{background-image:url('./notes-bg.jpg')}
.bg-vibe{background-image:url('./vibe-bg.jpg')}
.bg-quiz{background-image:url('./quiz-bg.jpg')}
.bg-results{background-image:url('./results-bg.jpg')}
.page-with-bg{position:relative}
.page-with-bg::before{content:'';position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:.18}
.page-shelf::before{background-image:url('./shelf-bg.jpg')}
.page-notes::before{background-image:url('./notes-bg.jpg')}
.page-vibe::before{background-image:url('./vibe-bg.jpg')}
.page-quiz::before{background-image:url('./quiz-bg.jpg')}
.page-results::before{background-image:url('./results-bg.jpg');opacity:.22}

/* ═══════════════════════════
   QUIZ OPTIONS
═══════════════════════════ */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.opt{background:rgba(255,255,255,.75);border:1.5px solid #E3C9A9;border-radius:16px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:left;display:flex;flex-direction:column;gap:7px}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:#C9A15E;background:rgba(201,161,94,.1);box-shadow:0 0 0 1px #C9A15E}
.opt-ico{font-size:24px}
.opt-lbl{font-family:'Playfair Display',serif;font-size:16px;color:#2B2928}
.opt-dsc{font-size:11px;color:#9C8F86;line-height:1.4}

/* ═══════════════════════════
   BUTTONS
═══════════════════════════ */
.btn{width:100%;border:none;padding:16px;font-family:'Playfair Display',serif;font-size:15px;letter-spacing:.1em;cursor:pointer;border-radius:4px;transition:all .2s}
.btn-dark{background:#2B2928;color:#fff}
.btn-dark:active{background:#1a1208}
.btn-dark:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid #E3C9A9;color:#9C8F86;font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin-top:10px}
.btn-ghost:hover{border-color:#C9A15E;color:#2B2928}

/* ═══════════════════════════
   NOTES GRID
═══════════════════════════ */
.notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.note{background:rgba(255,255,255,.75);border:1.5px solid #E3C9A9;border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s}
.note:active{transform:scale(.96)}
.note.sel{border-color:#C9A15E;background:rgba(201,161,94,.1)}
.note.hide{display:none}
.note-ico{font-size:20px;margin-bottom:5px}
.note-lbl{font-size:11px;color:#2B2928}
.btn-more{width:100%;background:transparent;border:1px solid #E3C9A9;color:#9C8F86;padding:11px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;border-radius:8px;margin-bottom:14px;font-family:'Inter',sans-serif;transition:all .2s}
.btn-more:hover{border-color:#C9A15E}

/* ═══════════════════════════
   VIBE TEXTAREA
═══════════════════════════ */
.vtxt{width:100%;min-height:130px;background:rgba(255,255,255,.8);border:1.5px solid #E3C9A9;border-radius:14px;padding:16px;font-family:'Inter',sans-serif;font-size:14px;color:#2B2928;resize:none;line-height:1.7;outline:none;-webkit-appearance:none}
.vtxt:focus{border-color:#C9A15E}
.vtxt::placeholder{color:#9C8F86;font-style:italic}
.vctr{text-align:right;font-size:11px;color:#9C8F86;margin-top:6px;margin-bottom:18px}
.hints-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#9C8F86;margin-bottom:10px}
.hints{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.hchip{background:rgba(239,221,190,.6);border:none;border-radius:20px;padding:7px 14px;font-size:12px;color:#2B2928;cursor:pointer;transition:all .15s}
.hchip:active{background:#EFDDBE}

/* ═══════════════════════════
   COLLECTION
═══════════════════════════ */
.cin-row{display:flex;gap:10px;margin-bottom:14px}
.cin{flex:1;background:rgba(255,255,255,.8);border:1.5px solid #E3C9A9;border-radius:10px;padding:13px 16px;font-family:'Inter',sans-serif;font-size:14px;color:#2B2928;outline:none;-webkit-appearance:none}
.cin:focus{border-color:#C9A15E}
.cadd{width:48px;height:48px;background:#2B2928;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.clist{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
.citem{background:rgba(255,255,255,.7);border:1px solid #E3C9A9;border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.crem{background:none;border:none;color:#9C8F86;cursor:pointer;font-size:16px;padding:2px 6px}
.cempty{font-size:13px;color:#9C8F86;font-style:italic;padding:8px 0;margin-bottom:14px}

/* ═══════════════════════════
   LOADING
═══════════════════════════ */
.loading-screen{min-height:100vh;background:url('./loading-bg.jpg') center/cover;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.loading-screen::before{content:'';position:absolute;inset:0;background:rgba(244,227,209,.5)}
.loading-inner{position:relative;z-index:1}
.llogo{font-family:'Playfair Display',serif;font-size:28px;letter-spacing:.15em;color:#2B2928;display:block;margin-bottom:6px}
.lsub{font-size:9px;letter-spacing:.5em;color:#C9A15E;text-transform:uppercase;margin-bottom:56px}
.lring{width:120px;height:120px;margin-bottom:48px;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:#5B514C;line-height:1.6}

/* ═══════════════════════════
   RESULTS
═══════════════════════════ */
.results-page{background:url('./results-bg.jpg') center top/cover fixed;min-height:100vh}
.results-inner{background:rgba(244,227,209,.88);min-height:100vh;padding-bottom:80px}

/* AI card */
.ai-card{background:rgba(255,255,255,.7);border:1px solid rgba(201,161,94,.25);border-radius:20px;padding:22px 18px;margin:0 16px;backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(201,161,94,.08)}
.ai-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(201,161,94,.1);border:1px solid rgba(201,161,94,.3);border-radius:20px;padding:5px 14px;margin-bottom:14px}
.ai-badge-dot{width:5px;height:5px;border-radius:50%;background:#C9A15E;animation:sp 2s ease infinite}
.ai-badge-txt{font-size:10px;color:#C9A15E;letter-spacing:.2em;text-transform:uppercase}
.ai-quote{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;line-height:1.8;color:#2B2928;margin-bottom:16px}
.ai-bottom{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.spills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.spill{background:rgba(201,161,94,.1);border:1px solid rgba(201,161,94,.3);border-radius:20px;padding:4px 10px;font-size:10px;color:#2B2928}
.match-pct{font-family:'Playfair Display',serif;font-size:32px;color:#2B2928;line-height:1;text-align:right}
.match-pct-lbl{font-size:9px;color:#9C8F86;letter-spacing:.15em;text-align:right}

/* Profile tags */
.ptags{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 16px 0}
.ptag{background:rgba(255,255,255,.65);border:1px solid #E3C9A9;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.ptag-ico{font-size:16px}
.ptag-lbl{font-size:9px;color:#9C8F86;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.ptag-val{font-size:12px;color:#2B2928;font-weight:500}

/* Section */
.rsec{padding:24px 16px 0}
.rsec-lbl{font-size:10px;color:#C9A15E;letter-spacing:.35em;text-transform:uppercase;margin-bottom:5px}
.rsec-ttl{font-family:'Playfair Display',serif;font-size:22px;color:#2B2928;margin-bottom:16px}

/* Match cards */
.mcards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mcard{background:rgba(255,255,255,.75);border:1.5px solid #E3C9A9;border-radius:16px;overflow:hidden}
.mcard.hero{border-color:#C9A15E;box-shadow:0 0 0 1px #C9A15E,0 4px 20px rgba(201,161,94,.12)}
.mcard-top{padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.mcard-top.dark{background:#2B2928}
.mbadge{font-size:8px;letter-spacing:.15em;text-transform:uppercase}
.mbadge.lt{color:#F2D28B}
.mbadge.mt{color:#9C8F86}
.mprice{font-size:10px;color:#C9A15E;letter-spacing:.1em}
.mcard-img{height:80px;background:linear-gradient(135deg,rgba(201,161,94,.06),rgba(244,227,209,.4));display:flex;align-items:center;justify-content:center;font-size:36px}
.mcard-body{padding:12px 12px 14px}
.m-brand{font-size:9px;color:#9C8F86;letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px}
.m-name{font-family:'Playfair Display',serif;font-size:16px;color:#2B2928;margin-bottom:3px;line-height:1.2}
.m-fam{font-size:10px;color:#C9A15E;margin-bottom:8px}
.m-why{font-size:11px;color:#6E625A;line-height:1.6;margin-bottom:8px;font-style:italic;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.m-notes{display:flex;gap:4px;flex-wrap:wrap}
.ntag{border:1px solid rgba(201,161,94,.3);border-radius:20px;padding:3px 8px;font-size:9px;color:#2B2928}

/* Layering */
.lcard{background:rgba(255,255,255,.72);border:1.5px solid #E3C9A9;border-radius:16px;padding:18px 16px;margin-bottom:12px}
.ltlbl{font-size:10px;letter-spacing:.25em;color:#C9A15E;text-transform:uppercase;margin-bottom:14px}
.lvis{display:flex;align-items:flex-end;gap:8px;margin-bottom:16px}
.lbot{flex:1;background:linear-gradient(135deg,rgba(201,161,94,.07),rgba(244,227,209,.3));border:1px solid rgba(201,161,94,.25);border-radius:12px;padding:12px 8px;text-align:center}
.lbico{font-size:22px;display:block;margin-bottom:5px}
.lbname{font-size:11px;color:#2B2928;font-weight:500;line-height:1.3}
.lbsub{font-size:10px;color:#9C8F86;margin-top:2px}
.lop{font-size:20px;color:#C9A15E;padding-bottom:12px;flex-shrink:0}
.lresult{background:rgba(201,161,94,.06);border:1px solid rgba(201,161,94,.15);border-radius:10px;padding:12px 14px}
.lrlbl{font-size:9px;letter-spacing:.2em;color:#9C8F86;text-transform:uppercase;margin-bottom:5px}
.lrtxt{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:#2B2928;line-height:1.75;margin-bottom:8px}
.lrinstr{font-size:11px;color:#9C8F86;line-height:1.6}

/* Guidance */
.gcard{background:rgba(255,255,255,.72);border:1.5px solid #E3C9A9;border-radius:16px;padding:18px 16px;margin-bottom:12px}
.gfam{font-family:'Playfair Display',serif;font-size:18px;color:#2B2928;margin-bottom:6px}
.gadv{font-size:12px;color:#6E625A;line-height:1.65;font-style:italic;margin-bottom:14px}
.gdirs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gdir{background:rgba(201,161,94,.07);border:1px solid rgba(201,161,94,.2);border-radius:10px;padding:12px 8px;text-align:center}
.gdir-ico{font-size:20px;margin-bottom:5px}
.gdir-name{font-size:11px;color:#2B2928;font-weight:500;margin-bottom:2px}
.gdir-sub{font-size:10px;color:#9C8F86}

/* Recipe */
.recipe{background:#2B2928;border-radius:18px;padding:22px 18px;margin:24px 16px 0;position:relative;overflow:hidden}
.recipe::after{content:'';position:absolute;top:-50px;right:-50px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(201,161,94,.12),transparent 70%);pointer-events:none}
.recipe-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.recipe-ttl{font-family:'Playfair Display',serif;font-size:16px;color:#F2D28B;letter-spacing:.1em}
.recipe-acts{display:flex;gap:12px}
.ract{background:transparent;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:12px;letter-spacing:.1em;font-family:'Inter',sans-serif}
.ract:hover{color:rgba(255,255,255,.8)}
.recipe-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.rcol{padding:0 12px 0 0;border-right:1px solid rgba(255,255,255,.07)}
.rcol:nth-child(2){padding:0 12px}
.rcol:last-child{border-right:none;padding:0 0 0 12px}
.rcol-lbl{font-size:8px;letter-spacing:.25em;color:#C9A15E;text-transform:uppercase;margin-bottom:6px}
.rcol-val{font-family:'Playfair Display',serif;font-size:12px;color:rgba(255,255,255,.85);line-height:1.6;font-style:italic}
.recipe-foot{margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.07);font-size:9px;color:rgba(255,255,255,.25);letter-spacing:.1em;text-align:center}

/* CTAs at bottom of results */
.bctas{padding:24px 16px 0;display:flex;gap:10px}
.btn-refine{flex:1;background:#2B2928;color:#fff;border:none;padding:15px;font-family:'Playfair Display',serif;font-size:13px;letter-spacing:.1em;cursor:pointer;border-radius:4px}
.btn-explore{flex:1;background:transparent;border:1.5px solid #E3C9A9;color:#2B2928;padding:15px;font-size:12px;letter-spacing:.1em;cursor:pointer;border-radius:4px;font-family:'Inter',sans-serif}
.btn-explore:hover{border-color:#C9A15E}

.divider{height:1px;background:#E3C9A9;margin:24px 16px 0}
</style>
</head>

<div id="app"></div>
<script>
const NOTES=[
  ['🪵','Oud'],['🟡','Amber'],['🍋','Bergamot'],['🌸','Jasmin'],
  ['🤍','Vanilija'],['🌿','Pačuli'],['🌹','Ruža'],['🌾','Vetiver'],
  ['🪨','Sandalovina'],['🌲','Cedar'],['🫧','Mošus'],['🍂','Duhan'],
  ['💜','Iris'],['🖤','Papar'],['🌼','Neroli'],['🤎','Koža'],
  ['🕯️','Tamjan'],['🥥','Kokos']
];
const QUIZ=[
  {id:'family',k:'KORAK 1',q:'Koji mirisi ti se najviše odgovaraju?',s:'Odaberi jedan smjer',t:'s',opts:[
    ['🍯','Slatko','Vanilija, karamel, mošus'],
    ['🌿','Svježe','Citrus, aqua, zeleno'],
    ['🪵','Drvenasto','Sandalovina, cedar, pačuli'],
    ['🌶️','Začinjeno','Oud, crni papar, kardamom']]},
  {id:'season',k:'KORAK 2',q:'Koje godišnje doba opisuje tvoj idealni miris?',s:'Svako doba nosi svoju energiju',t:'s',opts:[
    ['🌸','Proljeće','Cvjetno, svježe, nježno'],
    ['☀️','Ljeto','Morsko, lagano, citrus'],
    ['🍂','Jesen','Toplo, začinjeno, amber'],
    ['❄️','Zima','Duboko, kožno, dimno']]},
  {id:'occasion',k:'KORAK 3',q:'Kada ga nosiš?',s:'Možeš odabrati više',t:'m',opts:[
    ['☕','Svakodnevno','Casual, lagan, svjež'],
    ['🌙','Večernji','Taman, bogat, intrigantan'],

  {id:'intensity',k:'KORAK 4',q:'Koji intenzitet preferiraš?',s:'Koliko daleko ide tvoj sillage?',t:'s',opts:[
    ['🪷','Nježan','Blizak, intiman'],
    ['🌺','Umjeren','Prisutan, ugodan'],
    ['💥','Jak','Upečatljiv, dalekosežan'],
    ['🎭','Ovisi','Prilagodljiv, kontekstualan']]}
];
const HINTS=['Kiša na toplom asfaltu','Stara biblioteka i koža','Jutarnja kava i drvo','Ljetna noć na moru','Cvijeće nakon grmljavine'];
const BACK=`<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>`;

let S={pg:'landing',qi:0,ans:{},vibe:'',notes:[],notesX:false,coll:[],cin:'',res:null,lmsg:'',_iv:null};
const go=pg=>{S.pg=pg;window.scrollTo({top:0,behavior:'smooth'});render()};
const ss=p=>{Object.assign(S,p);render()};

function hdr(back){
  return`<div class="hdr"><button class="hdr-back" id="bk">${BACK} Natrag</button><div class="hdr-logo sf">SILLAGE</div><div style="width:60px"></div></div>`;
}
function prog(){
  const pct=((S.qi+1)/QUIZ.length)*100;
  return`<div class="prog">
    <div class="prog-label">Korak ${S.qi+1} od ${QUIZ.length}</div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-dots">${QUIZ.map((_,i)=>`<div class="dot${i<S.qi?' done':i===S.qi?' on':''}"></div>`).join('')}</div>
  </div>`;
}

/* ── LANDING ── */
function landingPage(){
  const d=document.createElement('div');
  d.innerHTML=`
    <div class="screen">
      <div class="screen-bg land-bg"></div>
      <div class="screen-overlay land-overlay"></div>
      <div class="screen-content">
        <div class="land-top">
          <div>
            <div class="land-logo sf">SILLAGE</div>
            <div class="land-logo-tag">AI Perfume Expert</div>
          </div>
        </div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px 0">
          <img src="./bottle-hero.jpg" style="max-height:42vh;max-width:75%;object-fit:contain;filter:drop-shadow(0 20px 40px rgba(180,120,80,.2));animation:float 6s ease-in-out infinite" alt="" onerror="this.style.display='none'">
        </div>
        <div class="land-body">
          <h1 class="land-h1 sf">Your scent,<br><em>decoded.</em></h1>
          <div class="land-rule"></div>
          <p class="land-desc">AI-crafted fragrance profile prilagođen tvojim emocijama, uspomenama i željama.</p>
          <button class="btn-land" id="s0">Saznaj svoj recept <span class="btn-spark">✦</span></button>
          <div class="land-lang">HR | EN</div>
        </div>
      </div>
    </div>`;
  d.querySelector('#s0').onclick=()=>go('shelf');
  return d;
}

/* ── SHELF ── */
function shelfPage(){
  const items=S.coll.length===0
    ?`<div class="cempty">Još nisi dodao/la ništa.</div>`
    :S.coll.map((x,i)=>`<div class="citem"><span>🫙 ${x}</span><button class="crem" data-i="${i}">✕</button></div>`).join('');
  const d=document.createElement('div');d.className='page-with-bg page-shelf';
  d.innerHTML=`
    ${hdr()}
    <div class="pg">
      <div class="pg-lbl">Digitalna Polica</div>
      <h1 class="pg-title sf">Što već imaš?</h1>
      <p class="pg-sub">Dodaj parfeme koje posjeduješ — AI će maksimizirati tvoju kolekciju kroz layering.</p>
      <div class="cin-row">
        <input class="cin" id="ci" placeholder='npr. "Dior Sauvage EDT"' value="${S.cin||''}">
        <button class="cadd" id="cadd">+</button>
      </div>
      <div class="clist">${items}</div>
      <button class="btn btn-dark" id="an">Analiziraj moj profil ✦</button>
      <button class="btn btn-ghost" id="sk">Preskoči i analiziraj</button>
    </div>`;
  d.querySelector('#bk').onclick=()=>go('landing');
  const inp=d.querySelector('#ci');
  inp.oninput=()=>{S.cin=inp.value};
  inp.onkeydown=e=>{if(e.key==='Enter')add()};
  function add(){const v=(S.cin||'').trim();if(v)ss({coll:[...S.coll,v],cin:''})}
  d.querySelector('#cadd').onclick=add;
  d.querySelectorAll('.crem').forEach(b=>{b.onclick=()=>ss({coll:S.coll.filter((_,i)=>i!==parseInt(b.dataset.i))})});
  d.querySelector('#an').onclick=()=>go('notes');
  d.querySelector('#sk').onclick=()=>go('notes');
  return d;
}

/* ── NOTES ── */
function notesPage(){
  const sel=S.notes,sx=S.notesX;
  const d=document.createElement('div');d.className='page-with-bg page-notes';
  d.innerHTML=`
    ${hdr()}
    <div class="pg">
      <div class="pg-lbl">Note Picker</div>
      <h1 class="pg-title sf">Odaberi note koje te privlače</h1>
      <p class="pg-sub">Možeš odabrati više, ili preskočiti.</p>
      <div class="notes-grid">
        ${NOTES.map((n,i)=>`<div class="note${sel.includes(n[1])?' sel':''}${(!sx&&i>=12)?' hide':''}" data-n="${n[1]}"><div class="note-ico">${n[0]}</div><div class="note-lbl">${n[1]}</div></div>`).join('')}
      </div>
      ${!sx?`<button class="btn-more" id="sm">+ Prikaži sve note (${NOTES.length-12} više)</button>`:''}
      <button class="btn btn-dark" id="nx">Dalje →</button>
      <button class="btn btn-ghost" id="sk">Preskoči</button>
    </div>`;
  d.querySelector('#bk').onclick=()=>go('shelf');
  d.querySelectorAll('.note').forEach(c=>{c.onclick=()=>{const n=c.dataset.n;ss({notes:sel.includes(n)?sel.filter(x=>x!==n):[...sel,n]})}});
  d.querySelector('#nx').onclick=()=>go('vibe');
  d.querySelector('#sk').onclick=()=>go('vibe');
  const sm=d.querySelector('#sm');if(sm)sm.onclick=()=>ss({notesX:true});
  return d;
}

/* ── VIBE ── */
function vibePage(){
  const d=document.createElement('div');d.className='page-with-bg page-vibe';
  d.innerHTML=`
    ${hdr()}
    <div class="pg">
      <div class="pg-lbl">The Vibe Box</div>
      <h1 class="pg-title sf">Opiši svoj vibe</h1>
      <p class="pg-sub">Napiši što želiš da tvoj idealni miris opisuje, osjeća se, podsjeća na...</p>
      <textarea class="vtxt" id="vt" maxlength="300" placeholder='"Tražim nešto što miriše na staru knjižnicu i kišu, ali da ima malo citrusa."'>${S.vibe}</textarea>
      <div class="vctr" id="vc">${S.vibe.length}/300</div>
      <div class="hints-lbl">Inspiracija</div>
      <div class="hints">${HINTS.map(h=>`<button class="hchip" data-h="${h}">${h}</button>`).join('')}</div>
      <button class="btn btn-dark" id="nx">Dalje →</button>
    </div>`;
  d.querySelector('#bk').onclick=()=>go('notes');
  const ta=d.querySelector('#vt'),vc=d.querySelector('#vc');
  ta.oninput=()=>{S.vibe=ta.value;vc.textContent=`${ta.value.length}/300`};
  d.querySelectorAll('.hchip').forEach(c=>{c.onclick=()=>{ta.value=c.dataset.h;S.vibe=c.dataset.h;vc.textContent=`${c.dataset.h.length}/300`}});
  d.querySelector('#nx').onclick=()=>ss({pg:'quiz',qi:0,ans:{}});
  return d;
}

/* ── QUIZ ── */
function quizPage(){
  const step=QUIZ[S.qi],ans=S.ans[S.qi],isMul=step.t==='m';
  const ok=isMul?(ans&&ans.length>0):!!ans;
  const d=document.createElement('div');d.className='page-with-bg page-quiz';
  d.innerHTML=`
    ${hdr()}
    ${prog()}
    <div class="pg">
      <div class="pg-lbl">${step.k}</div>
      <h1 class="pg-title sf">${step.q}</h1>
      <p class="pg-sub">${step.s}</p>
      <div class="opts">
        ${step.opts.map(([ico,lbl,dsc])=>{
          const sel=isMul?(ans&&ans.includes(lbl)):(ans===lbl);
          return`<div class="opt${sel?' sel':''}" data-v="${lbl}">
            <div class="opt-ico">${ico}</div>
            <div class="opt-lbl sf">${lbl}</div>
            <div class="opt-dsc">${dsc}</div>
          </div>`;
        }).join('')}
      </div>
      <button class="btn btn-dark" id="nx" ${ok?'':'disabled'}>${S.qi===QUIZ.length-1?'Završi →':'Dalje →'}</button>
    </div>`;
  d.querySelector('#bk').onclick=()=>S.qi>0?ss({qi:S.qi-1}):go('vibe');
  d.querySelectorAll('.opt').forEach(c=>{c.onclick=()=>{
    const v=c.dataset.v;
    if(isMul){const cur=S.ans[S.qi]||[];ss({ans:{...S.ans,[S.qi]:cur.includes(v)?cur.filter(x=>x!==v):[...cur,v]}})}
    else ss({ans:{...S.ans,[S.qi]:v}});
  }});
  d.querySelector('#nx').onclick=()=>{if(!ok)return;S.qi<QUIZ.length-1?ss({qi:S.qi+1}):analyze()};
  return d;
}

/* ── LOADING ── */
function loadingPage(){
  const d=document.createElement('div');
  d.innerHTML=`
    <div class="loading-screen">
      <div class="loading-inner">
        <span class="llogo sf">SILLAGE</span>
        <div class="lsub">Crafting your scent profile</div>
        <img class="lring" src="./icon-ring.png" alt="" onerror="this.style.cssText='width:100px;height:100px;margin-bottom:48px;border-radius:50%;border:1px solid #C9A15E;border-top-color:transparent;animation:spin 1s linear infinite'">
        <div class="lmsg" id="lm">${S.lmsg||'Analiziram tvoj mirisni profil...'}</div>
      </div>
    </div>`;
  return d;
}

/* ── ANALYZE ── */
async function analyze(){
  const msgs=['Analiziram tvoj mirisni profil...','Pronalazim savršene kombinacije...','Gradim tvoj Scent Recipe...','Još trenutak...'];
  let mi=0;
  ss({pg:'loading',lmsg:msgs[0]});
  if(S._iv)clearInterval(S._iv);
  S._iv=setInterval(()=>{mi=(mi+1)%msgs.length;const el=document.getElementById('lm');if(el)el.textContent=msgs[mi]},2200);

  const payload={collection:S.coll,vibe:S.vibe||'nije opisano',family:S.ans[0],season:S.ans[1],occasion:S.ans[2],intensity:S.ans[3],notes:S.notes};
  const h2=S.coll.length>=2;

  const sys=`Ti si SILLAGE — vrhunski AI parfemski stručnjak. Piši poetski, kao majstor parfimer. Svi opisi i tekstovi moraju biti na HRVATSKOM jeziku, osim naziva brendova i parfema koji ostaju na originalnom jeziku. Vrati SAMO valjani JSON bez markdowna:
{"match_score":92,"ai_insight":"2-3 poetske rečenice o njihovoj mirisnoj osobnosti na HR","scent_keywords":["kw1","kw2","kw3","kw4"],"profile":{"intenzitet":"","sezona":"","prigoda":"","note":""},"top_match":{"brand":"","name":"","concentration":"","scent_family":"","price_range":"$/$$/$$$/$$$$","why":"1-2 poetske rečenice na HR","notes":["n1","n2","n3","n4"]},"alt_match":{"brand":"","name":"","concentration":"","scent_family":"","price_range":"","why":"poetska rečenica na HR","notes":["n1","n2","n3"]},"layering":{"a":"${S.coll[0]||'tvoj omiljeni miris'}","a_sub":"","b":"naziv preporučenog parfema","b_sub":"kratki opis","result":"poetski opis blend-a na HR","tip":"praktičan savjet na HR"},"guidance":{"emoji":"🌊","title":"Naziv mirisne familije","text":"2 poetske rečenice na HR","dirs":[{"ico":"","name":"","sub":""},{"ico":"","name":"","sub":""},{"ico":"","name":"","sub":""}]},"recipe":{"nosi_desc":"kratki poetski opis","slozi_desc":"kratki opis layering kombinacije","istrazi_desc":"kratki smjer"}}`;

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1400,system:sys,messages:[{role:'user',content:JSON.stringify(payload)}]})});
    const data=await r.json();
    clearInterval(S._iv);
    const p=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    ss({res:p,pg:'results'});
  }catch(e){
    clearInterval(S._iv);
    ss({res:{match_score:92,ai_insight:"Privlači te efemerna magija mediteranskih ljeta, gdje slani zrak sreće noćni jasmin. Tvoja mirisna duša čezne za opojem slatkoćom koja pleše između oceana i romanike.",scent_keywords:["mediteranske noći","ocean","jasmin","romanika"],profile:{intenzitet:"Umjeren 🌺",sezona:"Ljeto ☀️",prigoda:"Večernji 🌙",note:"Vanilija, Jasmin, Mošus"},top_match:{brand:"TOM FORD",name:"Soleil Blanc",concentration:"EDP",scent_family:"Solar Floral",price_range:"$$$$",why:"Kao tekući mjesečev sjaj na toploj koži — kremasta slatkoća kokosa omotana u jasmin i ylang-ylang.",notes:["kokos","ylang-ylang","jasmin","morska sol"]},alt_match:{brand:"ESCADA",name:"Island Kiss",concentration:"EDT",scent_family:"Fruity Floral",price_range:"$$",why:"Tvoj ulaz u primorsku slatkoću — tropski voćni buket savršen za ljetne noći.",notes:["passion fruit","kokos","frangipani"]},layering:{a:S.coll[0]||"tvoj omiljeni miris",a_sub:"svježe cvjetne note",b:"Parma Blu Mediterraneo",b_sub:"morski pojačivač",result:"Oceanski povjetarac koji se sleđe u mekanu cvjetnu vaniliju.",tip:"Prskaj morski sprej na prsa, tvoj potpis na zapešća."},guidance:{emoji:"🌊",title:"Solar Florals & Aquatic Gourmands",text:"Kreni s laganom tropskom slatkoćom, zatim evoluiraj prema sofisticiranijim morskim cvjetovima.",dirs:[{ico:"🍋",name:"Citrus Marine",sub:"Svjež & Energičan"},{ico:"🌸",name:"White Florals",sub:"Lagan & Elegantan"},{ico:"🌿",name:"Soft Woods",sub:"Topao & Utješan"}]},recipe:{nosi_desc:"Lagane, svježe note koje evociraju ljetne noći uz more",slozi_desc:"Kombinacija morskih i cvjetnih nota s vanilijom za posebne prilike",istrazi_desc:"Istražite svježi cvjetni profil s vanilla bazom"}},pg:'results'});
  }
}

/* ── RESULTS ── */
function resultsPage(){
  const r=S.res;if(!r)return document.createElement('div');
  const d=document.createElement('div');
  const l=r.layering||{};const g=r.guidance||{};const p=r.profile||{};

  d.innerHTML=`
    <div class="results-page">
      <div class="results-inner">
        ${hdr()}

        <div style="padding:20px 0 0">
          <div class="ai-card">
            <div class="ai-badge"><div class="ai-badge-dot"></div><div class="ai-badge-txt">✦ ${r.match_score||89}% Match · AI Profil</div></div>
            <div class="ai-quote sf">"${r.ai_insight}"</div>
            <div class="ai-bottom">
              <div class="spills">${(r.scent_keywords||[]).map(k=>`<span class="spill">${k}</span>`).join('')}</div>
              <div><div class="match-pct sf">${r.match_score||89}%</div><div class="match-pct-lbl">Match</div></div>
            </div>
          </div>
        </div>

        <div class="ptags">
          ${p.intenzitet?`<div class="ptag"><div class="ptag-ico">💫</div><div><div class="ptag-lbl">Intenzitet</div><div class="ptag-val">${p.intenzitet}</div></div></div>`:''}
          ${p.sezona?`<div class="ptag"><div class="ptag-ico">☀️</div><div><div class="ptag-lbl">Sezona</div><div class="ptag-val">${p.sezona}</div></div></div>`:''}
          ${p.prigoda?`<div class="ptag"><div class="ptag-ico">🌙</div><div><div class="ptag-lbl">Prigoda</div><div class="ptag-val">${p.prigoda}</div></div></div>`:''}
          ${p.note?`<div class="ptag"><div class="ptag-ico">🌸</div><div><div class="ptag-lbl">Note</div><div class="ptag-val">${p.note}</div></div></div>`:''}
        </div>

        <div class="rsec" id="matches">
          <div class="rsec-lbl">The Matches</div>
          <div class="rsec-ttl sf">Specifične preporuke</div>
          <div class="mcards">
            <div class="mcard hero">
              <div class="mcard-top dark"><span class="mbadge lt">✦ Top match</span><span class="mprice">${r.top_match.price_range}</span></div>
              <div class="mcard-img">🧴</div>
              <div class="mcard-body">
                <div class="m-brand">${r.top_match.brand}</div>
                <div class="m-name sf">${r.top_match.name}</div>
                <div class="m-fam">${r.top_match.scent_family} · ${r.top_match.concentration}</div>
                <div class="m-why">${r.top_match.why}</div>
                <div class="m-notes">${(r.top_match.notes||[]).map(n=>`<span class="ntag">${n}</span>`).join('')}</div>
              </div>
            </div>
            <div class="mcard">
              <div class="mcard-top"><span class="mbadge mt">Alternativa</span><span class="mprice">${r.alt_match.price_range}</span></div>
              <div class="mcard-img">🧴</div>
              <div class="mcard-body">
                <div class="m-brand">${r.alt_match.brand}</div>
                <div class="m-name sf">${r.alt_match.name}</div>
                <div class="m-fam">${r.alt_match.scent_family} · ${r.alt_match.concentration}</div>
                <div class="m-why">${r.alt_match.why}</div>
                <div class="m-notes">${(r.alt_match.notes||[]).map(n=>`<span class="ntag">${n}</span>`).join('')}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="rsec">
          <div class="rsec-lbl">Layering Lab</div>
          <div class="rsec-ttl sf">Umjetnost slojevitosti</div>
          <div class="lcard">
            <div class="ltlbl">Upsell · Nadogradnja kolekcije</div>
            <div class="lvis">
              <div class="lbot"><span class="lbico">🫙</span><div class="lbname">${l.a}</div><div class="lbsub">${l.a_sub||''}</div></div>
              <div class="lop">+</div>
              <div class="lbot" style="border-color:rgba(201,161,94,.4)"><span class="lbico">✨</span><div class="lbname">${l.b}</div><div class="lbsub">${l.b_sub||''}</div></div>
              <div class="lop">=</div>
              <div class="lbot" style="background:rgba(201,161,94,.08);border-color:rgba(201,161,94,.3)"><span class="lbico">🌸</span><div class="lbsub" style="color:#C9A15E;font-size:10px">Blend</div></div>
            </div>
            <div class="lresult">
              <div class="lrlbl">Dobivaš</div>
              <div class="lrtxt">"${l.result||''}"</div>
              <div class="lrinstr">${l.tip||''}</div>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        ${g.title?`<div class="rsec">
          <div class="rsec-lbl">Strategic Guidance</div>
          <div class="rsec-ttl sf">Tvoj sljedeći smjer</div>
          <div class="gcard">
            <div class="ltlbl">${g.emoji||''} ${g.title}</div>
            <div class="gadv">${g.text||''}</div>
            <div class="gdirs">${(g.dirs||[]).map(dir=>`<div class="gdir"><div class="gdir-ico">${dir.ico}</div><div class="gdir-name">${dir.name}</div><div class="gdir-sub">${dir.sub}</div></div>`).join('')}</div>
          </div>
        </div>`:''}

        <div class="divider"></div>

        <div class="recipe">
          <div class="recipe-hdr">
            <div class="recipe-ttl sf">✦ Tvoj Scent Recipe</div>
            <div class="recipe-acts">
              <button class="ract" id="shareBtn">↗ Podijeli</button>
            </div>
          </div>
          <div class="recipe-cols">
            <div class="rcol"><div class="rcol-lbl">NOSI</div><div class="rcol-val">${r.recipe?.nosi_desc||''}</div></div>
            <div class="rcol"><div class="rcol-lbl">SLOŽI</div><div class="rcol-val">${r.recipe?.slozi_desc||''}</div></div>
            <div class="rcol"><div class="rcol-lbl">ISTRAŽI</div><div class="rcol-val">${r.recipe?.istrazi_desc||''}</div></div>
          </div>
          <div class="recipe-foot">Synthesized by the collective intelligence.</div>
        </div>

        <div class="bctas">
          <button class="btn-refine" id="rfBtn">Refine your scent ✦</button>
          <button class="btn-explore" id="exBtn">Explore another vibe</button>
        </div>

      </div>
    </div>`;

  d.querySelector('#bk').onclick=()=>{S.res=null;go('landing')};
  d.querySelector('#rfBtn').onclick=()=>go('vibe');

  d.querySelector('#shareBtn').onclick=()=>{if(navigator.share)navigator.share({title:'Moj SILLAGE Scent Recipe',url:location.href});else{navigator.clipboard?.writeText(location.href);alert('Link kopiran!')}};
  return d;
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById('app');if(!app)return;
  app.innerHTML='';
  const fns={landing:landingPage,shelf:shelfPage,notes:notesPage,vibe:vibePage,quiz:quizPage,loading:loadingPage,results:resultsPage};
  const fn=fns[S.pg];
  if(fn)app.appendChild(fn());
}
render();
</script>
</body>
</html>
